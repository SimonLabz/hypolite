<!DOCTYPE html>
<html lang="fr-CA">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculatrice hypothécaire | Hypolite
<meta name="description" content="Calculatrice hypothécaire canadienne — comparez stratégies de prêt à terme, prêt variable et HELOC avec sous-prêts, prime SCHL, intérêts par terme et amortissement.">
<meta name="theme-color" content="#012340">
<meta property="og:type" content="website">
<meta property="og:title" content="Calculatrice hypothécaire | Hypolite>
<meta property="og:description" content="Comparez vos stratégies hypothécaires complètes. Sous-prêts, SCHL, intérêts.">
<meta property="og:url" content="https://hypolite.ca/calculatrice/">
<meta property="og:locale" content="fr_CA">
<link rel="canonical" href="https://hypolite.ca/calculatrice/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #012340;
    --navy-2: #093162;
    --navy-3: #024E90;
    --blue-light: #50AACE;
    --blue-pale: #C2E1EE;
    --gold: #D5A05F;
    --gold-light: #DEB583;
    --white: #FFFFFF;
    --grey: #616C78;
    --border: rgba(255,255,255,0.10);
    --border-strong: rgba(255,255,255,0.18);
    --bg-card: rgba(255,255,255,0.04);
    --bg-input: rgba(0,0,0,0.25);
    --green: #6fde9c;
    --red: #ff7373;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(ellipse at top right, rgba(213,160,95,0.10) 0%, transparent 55%),
      radial-gradient(ellipse at bottom left, rgba(80,170,206,0.08) 0%, transparent 55%),
      linear-gradient(180deg, #001a30 0%, var(--navy) 100%);
    background-attachment: fixed;
    color: var(--white);
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ============ TOP BAR (plus grand) ============ */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: rgba(1,35,64,0.72);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    position: sticky;
    top: 0;
    z-index: 50;
    gap: 16px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 16px;
    min-width: 0;
    text-decoration: none;
    color: inherit;
    transition: opacity 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .brand:hover {
    opacity: 0.92;
    transform: translateY(-1px);
  }
  .brand:hover .brand-name {
    color: var(--gold);
  }
  .brand img {
    width: 64px;
    height: 64px;
    object-fit: contain;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.4));
    flex-shrink: 0;
  }
  .brand-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
    min-width: 0;
  }
  .brand-name {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: var(--white);
    white-space: nowrap;
    transition: color 0.2s;
  }
  .brand-sub {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 2px;
  }
  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  .btn-cta {
    background: var(--gold);
    color: var(--navy);
    border: 1px solid var(--gold);
    padding: 11px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .btn-cta:hover { background: var(--gold-light); border-color: var(--gold-light); transform: translateY(-1px); }
  .btn-cta.secondary {
    background: transparent;
    color: var(--white);
    border: 1px solid var(--border-strong);
  }
  .btn-cta.secondary:hover { background: rgba(255,255,255,0.06); border-color: var(--gold); color: var(--gold); }

  .icon-btn {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--white);
    width: 42px;
    height: 42px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-family: inherit;
    flex-shrink: 0;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.06); border-color: var(--gold); color: var(--gold); }

  /* ============ MAIN ============ */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }
  .global-panel {
    width: 340px;
    flex-shrink: 0;
    background: rgba(0,0,0,0.20);
    border-right: 1px solid var(--border);
    padding: 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .panel-title {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .columns-wrap {
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    display: flex;
    padding: 24px 28px;
    gap: 16px;
    scroll-behavior: smooth;
    min-height: 0;
  }
  ::-webkit-scrollbar { height: 8px; width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

  /* ============ FIELDS ============ */
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 10px;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .field input, .field select {
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--white);
    padding: 11px 13px;
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    font-weight: 400;
    width: 100%;
    transition: all 0.2s;
  }
  .field input:focus, .field select:focus {
    outline: none;
    border-color: var(--gold);
    background: rgba(0,0,0,0.35);
  }
  .field select option { background: var(--navy); color: var(--white); }
  .field select option:disabled { color: rgba(255,255,255,0.3); font-style: italic; }
  .field input[type="number"]::-webkit-outer-spin-button,
  .field input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .field input[type="number"] { -moz-appearance: textfield; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ============ INFO BLOCKS ============ */
  .info-block {
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .info-row { display: flex; justify-content: space-between; font-size: 13px; align-items: baseline; }
  .info-row .lbl { color: rgba(255,255,255,0.6); font-weight: 400; }
  .info-row .val { color: var(--white); font-variant-numeric: tabular-nums; font-weight: 500; }
  .info-row .val.accent { color: var(--gold); font-weight: 600; }

  .reg-alert {
    background: rgba(213,160,95,0.10);
    border: 1px solid rgba(213,160,95,0.35);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--gold-light);
    line-height: 1.45;
    display: none;
  }
  .reg-alert.show { display: block; }
  .reg-alert strong { color: var(--gold); font-weight: 600; }

  /* ============ TOTAL GLOBAL BLOCK ============ */
  .total-block {
    background: linear-gradient(135deg, rgba(213,160,95,0.12) 0%, rgba(213,160,95,0.04) 100%);
    border: 1px solid rgba(213,160,95,0.35);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 4px;
  }
  .total-block .total-title {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 600;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(213,160,95,0.20);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .total-block .total-count {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    font-weight: 400;
    letter-spacing: 0.1em;
  }

  /* ============ MOBILE ============ */
  @media (max-width: 900px) {
    .main { flex-direction: column; }
    .global-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
    .columns-wrap { padding: 16px; }
    .top-bar { padding: 14px 16px; flex-wrap: wrap; }
    .brand img { width: 52px; height: 52px; }
    .brand-name { font-size: 18px; }
    .btn-cta { padding: 9px 14px; font-size: 12px; }
  }

  /* ============ FULLSCREEN (pour Reels) ============ */
  :fullscreen .top-bar { display: none; }
  :fullscreen .amf-footer { display: none; }
  :fullscreen .global-panel { width: 380px; }

  /* ============ EMBED MODE (?embed=1) ============ */
  body.embed .top-bar,
  body.embed .amf-footer { display: none; }

  /* ============ SCÉNARIO (COLONNE) ============ */
  .col {
    min-width: 360px;
    flex: 0 0 360px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .col-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .col-num {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* Bouton + doré pour ajouter un nouveau scénario, suit toujours la dernière colonne */
  .add-col-btn {
    flex: 0 0 auto;
    align-self: stretch;
    min-width: 80px;
    width: 80px;
    background: transparent;
    border: 2px dashed rgba(213, 160, 95, 0.45);
    color: var(--gold);
    border-radius: 16px;
    cursor: pointer;
    font-family: inherit;
    font-size: 32px;
    font-weight: 300;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
    padding: 20px 12px;
  }
  .add-col-btn:hover {
    background: rgba(213, 160, 95, 0.08);
    border-color: var(--gold);
    border-style: solid;
    transform: translateY(-2px);
  }
  .add-col-btn .add-col-plus {
    font-size: 36px;
    line-height: 1;
    font-weight: 200;
  }
  .add-col-btn .add-col-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 600;
    text-align: center;
    line-height: 1.3;
  }
  .add-col-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
  }
  .add-col-btn:disabled:hover {
    background: transparent;
    border-style: dashed;
    transform: none;
  }
  .remove-btn {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    font-size: 22px;
    width: 26px;
    height: 26px;
    line-height: 1;
    transition: color 0.2s;
    font-family: inherit;
  }
  .remove-btn:hover { color: var(--red); }

  /* Scénario en erreur d'attribution : bordure rouge épaisse + glow prononcé */
  .col.invalid {
    border: 3px solid var(--red);
    box-shadow:
      0 0 0 2px rgba(255, 115, 115, 0.30),
      0 0 32px rgba(255, 115, 115, 0.40),
      inset 0 0 20px rgba(255, 115, 115, 0.06);
    /* Compenser pour que la colonne ne change pas de taille */
    padding: 20px;
    animation: invalid-pulse 2s ease-in-out infinite;
  }
  .col.invalid .col-num {
    color: var(--red);
    font-weight: 700;
  }

  @keyframes invalid-pulse {
    0%, 100% {
      box-shadow:
        0 0 0 2px rgba(255, 115, 115, 0.30),
        0 0 32px rgba(255, 115, 115, 0.40),
        inset 0 0 20px rgba(255, 115, 115, 0.06);
    }
    50% {
      box-shadow:
        0 0 0 2px rgba(255, 115, 115, 0.45),
        0 0 40px rgba(255, 115, 115, 0.55),
        inset 0 0 20px rgba(255, 115, 115, 0.10);
    }
  }

  /* Scénario valide : bordure verte épaisse + glow plus prononcé que le rouge */
  .col.valid {
    border: 4px solid var(--green);
    box-shadow:
      0 0 0 3px rgba(111, 222, 156, 0.30),
      0 0 48px rgba(111, 222, 156, 0.50),
      inset 0 0 24px rgba(111, 222, 156, 0.08);
    padding: 19px;
    animation: valid-glow 2.4s ease-in-out infinite;
  }
  .col.valid .col-num {
    color: var(--green);
    font-weight: 700;
  }

  @keyframes valid-glow {
    0%, 100% {
      box-shadow:
        0 0 0 3px rgba(111, 222, 156, 0.30),
        0 0 48px rgba(111, 222, 156, 0.50),
        inset 0 0 24px rgba(111, 222, 156, 0.08);
    }
    50% {
      box-shadow:
        0 0 0 4px rgba(111, 222, 156, 0.50),
        0 0 64px rgba(111, 222, 156, 0.75),
        inset 0 0 28px rgba(111, 222, 156, 0.14);
    }
  }

  /* Statut d'attribution : version explicite avec titre + détail */
  .attrib-status {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.03em;
    text-align: left;
    padding: 10px 12px;
    border-radius: 8px;
    line-height: 1.5;
  }
  .attrib-status.ok { color: var(--green); background: rgba(111,222,156,0.10); border: 1px solid rgba(111,222,156,0.25); }
  .attrib-status.under { color: var(--red); background: rgba(255,115,115,0.10); border: 1px solid rgba(255,115,115,0.30); }
  .attrib-status.over { color: var(--red); background: rgba(255,115,115,0.10); border: 1px solid rgba(255,115,115,0.30); }
  .attrib-status .status-title { font-weight: 600; display: block; margin-bottom: 4px; font-size: 12px; letter-spacing: 0.04em; }
  .attrib-status .status-detail { font-size: 11px; opacity: 0.95; }
  .attrib-status .status-action { font-size: 11px; margin-top: 4px; padding-top: 4px; border-top: 1px solid currentColor; opacity: 0.85; display: block; }

  /* ============ SOUS-PRÊT ============ */
  .subprets {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .subpret {
    background: rgba(0,0,0,0.20);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    border-left-width: 4px;
  }
  .subpret.color-A { border-left-color: #50AACE; }
  .subpret.color-B { border-left-color: #D5A05F; }
  .subpret.color-C { border-left-color: #6fde9c; }
  .subpret.color-D { border-left-color: #C792EA; }
  .subpret.color-E { border-left-color: #FF9F45; }
  .subpret-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .subpret-num {
    font-size: 9px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* Select du type de sous-prêt — lisible sur fond gris/navy */
  .subpret-type-select {
    background: var(--navy);
    border: 1px solid var(--border-strong);
    color: var(--white);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23D5A05F' stroke-width='2.5'%3e%3cpolyline points='6 9 12 15 18 9'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 6px center;
    background-size: 12px;
    padding-right: 24px;
  }
  .subpret-type-select:hover { border-color: var(--gold); }
  .subpret-type-select:focus { outline: none; border-color: var(--gold); }
  .subpret-type-select option {
    background: var(--navy);
    color: var(--white);
    padding: 8px;
  }
  .subpret-type-select option:disabled {
    color: rgba(255,255,255,0.35);
    font-style: italic;
  }
  .subpret-results {
    margin-top: 4px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .sub-row { display: flex; justify-content: space-between; align-items: baseline; font-size: 12px; }
  .sub-row .lbl { color: rgba(255,255,255,0.55); letter-spacing: 0.05em; }
  .sub-row .val { color: var(--white); font-variant-numeric: tabular-nums; font-weight: 500; }
  .sub-row.primary .val { color: var(--gold); font-size: 16px; font-weight: 600; }

  .add-sub-btn {
    background: transparent;
    border: 1px dashed var(--border-strong);
    color: rgba(255,255,255,0.6);
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .add-sub-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(213,160,95,0.05); }
  .add-sub-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ============ TOTAL SCÉNARIO ============ */
  .scen-summary {
    margin-top: auto;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .scen-summary-title {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .attrib-bar {
    height: 6px;
    background: rgba(255,255,255,0.10);
    border-radius: 3px;
    overflow: hidden;
  }
  .attrib-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 100%);
    border-radius: 3px;
    transition: width 0.3s ease, background 0.3s;
    width: 0%;
  }
  .attrib-bar-fill.over { background: linear-gradient(90deg, var(--red) 0%, #ff9b73 100%); }
  .attrib-bar-fill.complete { background: linear-gradient(90deg, var(--green) 0%, #95e8b3 100%); }

  .attrib-status {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-align: center;
    padding: 6px 8px;
    border-radius: 6px;
  }
  .attrib-status.ok { color: var(--green); background: rgba(111,222,156,0.10); }
  .attrib-status.under { color: var(--gold); background: rgba(213,160,95,0.10); }
  .attrib-status.over { color: var(--red); background: rgba(255,115,115,0.10); }

  .scen-results {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
  }
  .scen-row { display: flex; justify-content: space-between; align-items: baseline; }
  .scen-row .lbl {
    font-size: 10px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .scen-row .val {
    font-size: 16px;
    font-weight: 400;
    color: rgba(255,255,255,0.85);
    font-variant-numeric: tabular-nums;
  }
  .scen-row.primary .val {
    color: var(--gold);
    font-size: 22px;
    font-weight: 500;
  }

  /* ============ GROUPE BOUTONS PARTAGE DANS LE HEADER ============ */
  .share-group {
    display: flex;
    gap: 6px;
    padding: 4px 8px;
    border: 1px solid var(--border-strong);
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
  }
  .share-group .icon-btn.share-icon {
    width: 38px;
    height: 38px;
    font-size: 16px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--white);
  }
  .share-group .icon-btn.share-icon:hover {
    background: var(--gold);
    color: var(--navy);
    border-color: var(--gold);
  }

  /* Mobile : compresser le groupe partage */
  @media (max-width: 900px) {
    .share-group { padding: 3px 5px; gap: 3px; }
    .share-group .icon-btn.share-icon { width: 34px; height: 34px; font-size: 14px; }
  }

  /* ============ OVERLAY BOOKING ============ */
  /* ============ MODALE CONSULTATION GRATUITE ============ */
  .consult-overlay {
    position: fixed;
    inset: 0;

    width: 0;
    opacity: 0;
    transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
  }
  .deep-dive-panel.open {
    display: flex;
    width: min(900px, calc(100vw - 400px));
    opacity: 1;
  }
  @media (max-width: 900px) {
    .deep-dive-panel.open { width: calc(100vw - 60px); }
  }

  /* Quand le deep dive est ouvert : cacher les autres scénarios */
  body.dd-open .col:not(.dd-active) {
    display: none;
  }
  /* Cacher le bouton + Nouveau scénario quand deep dive ouvert */
  body.dd-open .add-col-btn {
    display: none;
  }

  .deep-dive-content {
    flex: 1;
    padding: 24px 28px;
    overflow-y: auto;
    min-width: 0;
  }
  @media (max-width: 900px) {
    .deep-dive-content { min-width: 100vw; padding: 16px; }
  }

  .deep-dive-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .deep-dive-title {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .deep-dive-title .tag {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .deep-dive-title h2 {
    font-size: 22px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: -0.01em;
  }
  /* Navigation entre scénarios */
  .deep-dive-nav {
    display: flex;
    align-items: center;
    gap: 14px;
    flex: 1;
    min-width: 0;
  }
  .dd-nav-btn {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--white);
    width: 38px;
    height: 38px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    font-family: inherit;
    font-weight: 500;
    transition: all 0.2s;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .dd-nav-btn:hover:not(:disabled) {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--navy);
  }
  .dd-nav-btn:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }

  .deep-dive-close {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--white);
    width: 42px;
    height: 42px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 20px;
    font-family: inherit;
    transition: all 0.2s;
  }
  .deep-dive-close:hover {
    background: var(--red);
    border-color: var(--red);
  }

  .dd-section {
    margin-bottom: 28px;
  }
  .dd-section-title {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 12px;
  }

  /* Sélecteur de privilège */
  .privilege-selector {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .privilege-pill {
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: rgba(255,255,255,0.7);
    padding: 10px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .privilege-pill:hover {
    border-color: var(--gold);
    color: var(--white);
  }
  .privilege-pill.active {
    background: var(--gold);
    color: var(--navy);
    border-color: var(--gold);
    font-weight: 600;
  }
  .privilege-pill .sub {
    font-size: 10px;
    opacity: 0.85;
    display: block;
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  /* Placeholder pour le graphique (étapes 2-3) */
  .dd-chart-placeholder {
    background: var(--bg-input);
    border: 1px dashed var(--border-strong);
    border-radius: 12px;
    padding: 60px 20px;
    text-align: center;
    color: rgba(255,255,255,0.4);
    font-size: 13px;
  }

  /* Bloc de stats économies */
  .dd-savings {
    background: linear-gradient(135deg, rgba(111,222,156,0.10) 0%, rgba(111,222,156,0.03) 100%);
    border: 1px solid rgba(111,222,156,0.30);
    border-radius: 12px;
    padding: 16px 18px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
  }
  .dd-savings .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .dd-savings .stat .lbl {
    font-size: 10px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .dd-savings .stat .val {
    font-size: 18px;
    font-weight: 600;
    color: var(--green);
    font-variant-numeric: tabular-nums;
  }

  /* ============ VERSEMENTS : LISTE + FORMULAIRE ============ */
  .dd-vers-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
  }
  .dd-vers-item {
    display: grid;
    grid-template-columns: 1fr 100px 120px 120px 64px;
    gap: 10px;
    align-items: center;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    transition: border-color 0.2s, background 0.2s;
  }
  .dd-vers-item.editing {
    background: rgba(213, 160, 95, 0.10);
    border-color: var(--gold);
  }
  .dd-vers-item .col-lbl { font-size: 11px; color: rgba(255,255,255,0.6); }
  .dd-vers-item .col-val { color: var(--white); font-variant-numeric: tabular-nums; font-weight: 500; }
  .dd-vers-item .vers-actions {
    display: flex;
    gap: 4px;
    justify-content: flex-end;
  }
  .dd-vers-item .vers-edit,
  .dd-vers-item .vers-remove {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    font-size: 14px;
    transition: color 0.2s;
    padding: 4px 6px;
    border-radius: 4px;
    line-height: 1;
  }
  .dd-vers-item .vers-edit:hover { color: var(--gold); }
  .dd-vers-item .vers-remove:hover { color: var(--red); }
  /* Bouton "Sauvegarder" en mode édition */
  .dd-vers-form button.editing-mode {
    background: var(--gold);
    color: var(--navy);
  }
  .dd-vers-form #ddVersCancel {
    background: transparent;
    color: rgba(255,255,255,0.7);
    border: 1px solid var(--border-strong);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    margin-left: 6px;
    transition: all 0.2s;
  }
  .dd-vers-form #ddVersCancel:hover { color: var(--white); border-color: rgba(255,255,255,0.4); }

  .dd-vers-form {
    display: grid;
    grid-template-columns: 1fr 130px 130px 130px auto;
    gap: 10px;
    align-items: end;
    background: rgba(213,160,95,0.05);
    border: 1px dashed rgba(213,160,95,0.30);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 12px;
  }
  .dd-vers-form .field { gap: 4px; }
  .dd-vers-form .field input,
  .dd-vers-form .field select {
    padding: 8px 10px;
    font-size: 13px;
  }
  .dd-vers-form button {
    background: var(--gold);
    color: var(--navy);
    border: none;
    padding: 9px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    height: 36px;
    transition: all 0.2s;
  }
  .dd-vers-form button:hover { background: var(--gold-light); }

  /* Alerte privilège dépassé */
  .dd-priv-alert {
    background: rgba(255, 115, 115, 0.10);
    border: 2px solid rgba(255, 115, 115, 0.55);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 12px;
    color: var(--red);
    font-size: 13px;
    line-height: 1.5;
    display: none;
    box-shadow: 0 0 24px rgba(255, 115, 115, 0.20);
  }
  .dd-priv-alert.show { display: block; }
  .dd-priv-alert strong { font-weight: 600; }
  .dd-priv-alert .max-restant {
    color: var(--gold);
    font-weight: 600;
  }

  /* Tableau d'amortissement */
  .dd-table-wrap {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    max-height: 480px;
    overflow-y: auto;
  }
  .dd-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .dd-table thead {
    position: sticky;
    top: 0;
    background: var(--navy);
    z-index: 1;
  }
  .dd-table th {
    text-align: right;
    padding: 10px 12px;
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 10px;
    border-bottom: 1px solid var(--border);
  }
  .dd-table th:first-child { text-align: center; }
  .dd-table th:nth-child(2) { text-align: left; }
  .dd-table td {
    padding: 8px 12px;
    text-align: right;
    color: rgba(255,255,255,0.85);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .dd-table td:first-child { text-align: center; color: rgba(255,255,255,0.5); font-size: 11px; }
  .dd-table td:nth-child(2) { text-align: left; color: rgba(255,255,255,0.6); font-size: 11px; }
  .dd-table tr.year-end { border-bottom: 1px solid rgba(213,160,95,0.20); }
  .dd-table tr.year-end td:first-child { color: var(--gold); font-weight: 600; }
  .dd-table tr:hover { background: rgba(255,255,255,0.03); }
  .dd-table .vers-cell {
    color: var(--green);
    font-weight: 500;
  }
  .dd-table .add-vers-inline {
    background: transparent;
    border: 1px dashed var(--border-strong);
    color: rgba(255,255,255,0.5);
    padding: 2px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    transition: all 0.2s;
  }
  .dd-table .add-vers-inline:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(213,160,95,0.10);
  }

  @media (max-width: 900px) {
    .dd-vers-form { grid-template-columns: 1fr; }
    .dd-vers-item { grid-template-columns: 1fr; gap: 6px; padding: 12px; }
    .dd-table { font-size: 11px; }
    .dd-table th, .dd-table td { padding: 6px 8px; }
  }


  /* MODALE CONSENTEMENT */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,15,30,0.88);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .modal-overlay.show { display: flex; opacity: 1; }
  .modal {
    background: linear-gradient(160deg, #002850 0%, #001a30 100%);
    border: 1px solid var(--border-strong);
    border-radius: 20px;
    padding: 36px 32px;
    max-width: 480px;
    width: 100%;
    max-height: calc(100vh - 40px);
    overflow-y: auto;
    box-shadow: 0 40px 80px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(213,160,95,0.15);
    transform: scale(0.95) translateY(10px);
    transition: transform 0.3s ease;
    position: relative;
  }
  .modal-overlay.show .modal { transform: scale(1) translateY(0); }
  .modal-hippo {
    width: 90px;
    height: 90px;
    margin: -8px auto 12px;
    display: block;
    object-fit: contain;
    filter: drop-shadow(0 8px 20px rgba(213,160,95,0.3));
  }
  .modal h2 {
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .modal .modal-tag {
    text-align: center;
    color: var(--gold);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 20px;
  }
  .modal p.modal-intro {
    color: rgba(255,255,255,0.75);
    font-size: 14px;
    line-height: 1.55;
    margin-bottom: 22px;
    text-align: center;
  }
  .modal .form-fields {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 18px;
  }
  .modal .form-fields .field input {
    padding: 13px 14px;
    font-size: 15px;
  }
  .consent-block {
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .consent-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .consent-row:last-child { margin-bottom: 0; }
  .consent-row input[type=checkbox] {
    margin-top: 2px;
    width: 18px;
    height: 18px;
    accent-color: var(--gold);
    cursor: pointer;
    flex-shrink: 0;
  }
  .consent-row label {
    color: rgba(255,255,255,0.85);
    font-size: 12.5px;
    line-height: 1.5;
    cursor: pointer;
  }
  .consent-row label strong { color: var(--gold); font-weight: 500; }
  .privacy-link {
    color: var(--gold);
    text-decoration: underline;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    font-family: inherit;
    font-size: inherit;
  }
  .privacy-link:hover { color: var(--gold-light); }
  .modal-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .btn-primary {
    background: var(--gold);
    color: var(--navy);
    border: none;
    padding: 14px 20px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: transparent;
    color: rgba(255,255,255,0.6);
    border: none;
    padding: 10px 14px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.05em;
  }
  .btn-secondary:hover { color: var(--white); }
  .modal-status {
    text-align: center;
    font-size: 13px;
    margin-top: 12px;
    min-height: 18px;
  }
  .modal-status.error { color: #ff7373; }
  .modal-status.success { color: #6fde9c; }

  /* Politique de confidentialité — vue */
  .privacy-content {
    display: none;
  }
  .privacy-content.show { display: block; }
  .privacy-content h3 {
    color: var(--gold);
    font-size: 14px;
    font-weight: 600;
    margin: 14px 0 6px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .privacy-content p, .privacy-content li {
    color: rgba(255,255,255,0.75);
    font-size: 13px;
    line-height: 1.55;
    margin-bottom: 8px;
  }
  .privacy-content ul { padding-left: 18px; }
  .form-content.hide { display: none; }

</style>
</head>

<script>
  // ============ CONFIG ============
  const CONFIG = {
    POWER_AUTOMATE_URL: null, // <-- À remplir après création du flow

    PRIVACY_VERSION: '2026-05-01',
    STORAGE_KEY: 'hippo_consent_v1',
    CONSENT_VALIDITY_DAYS: 30,
    MAX_COLS: 10,
    MAX_SUBPRETS: 5
  };

  // ============ DOM REFS ============
  const $ = id => document.getElementById(id);
  const wrap = $('colsWrap');
  const fsBtn = $('fsBtn');

  // Bouton + doré flottant pour ajouter un scénario (créé dynamiquement)
  const addBtn = document.createElement('button');
  addBtn.className = 'add-col-btn';
  addBtn.id = 'addBtn';
  addBtn.title = 'Ajouter un scénario de comparaison';
  addBtn.innerHTML = '<span class="add-col-plus">+</span><span class="add-col-label">Nouveau<br>scénario</span>';
  wrap.appendChild(addBtn);

  const gType = $('g_type'), gVm = $('g_vm'), gMdf = $('g_mdf'), gMdfPct = $('g_mdf_pct');
  const gPretBase = $('g_pret_base'), gPrimePct = $('g_prime_pct'), gPrimeMnt = $('g_prime_mnt');
  const gPretTotal = $('g_pret_total'), gRatio = $('g_ratio'), gAlert = $('g_alert');
  const tCount = $('t_count'), tMinMensuel = $('t_min_mensuel'), tMaxMensuel = $('t_max_mensuel'), tEconomie = $('t_economie');

  let colId = 0, subId = 0, pretTotal = 0;
  let currentTransactionType = 'achat', currentMdfPct = 20, currentVm = 0;

  // ============ FORMATTERS ============
  const fmtCAD = n => isFinite(n) && !isNaN(n)
    ? new Intl.NumberFormat('fr-CA', { style: 'currency', currency: 'CAD', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n)
    : '—';
  const fmtPct = n => isFinite(n) ? n.toFixed(2) + ' %' : '—';

  // ============ RÈGLES RÉGLEMENTAIRES ============
  function primeSCHL(mdfPct) {
    if (mdfPct >= 20) return 0;
    if (mdfPct >= 15) return 0.0280;
    if (mdfPct >= 10) return 0.0310;
    if (mdfPct >= 5)  return 0.0400;
    return null;
  }

  function miseDeFondsMinimumAchat(vm) {
    if (vm <= 0) return 0;
    if (vm <= 500000) return vm * 0.05;
    if (vm <= 1500000) return 25000 + (vm - 500000) * 0.10;
    return vm * 0.20;
  }

  // ============ FORMULES ============
  const tauxPeriodique = (taux, ppa) => Math.pow(1 + (taux/100)/2, 2/ppa) - 1;
  const tauxPeriodiqueVar = (taux, ppa) => Math.pow(1 + (taux/100)/12, 12/ppa) - 1;
  const paiement = (m, tx, n) => tx === 0 ? m/n : m * tx / (1 - Math.pow(1+tx, -n));
  const soldeRestant = (m, tx, pmt, k) => m * Math.pow(1+tx, k) - pmt * (Math.pow(1+tx, k)-1)/tx;

  // ============ CALCUL D'UN SOUS-PRÊT ============
  function calculerSubpret(sub) {
    const type = sub.querySelector('[data-f=type]').value;
    const portion = parseFloat(sub.querySelector('[data-f=portion]').value) || 0;
    const out = {
      type, portion, mensuel: 0, hebdo: 0, bihebdo: 0,
      intTerme: 0, intAmort: 0, soldeFinTerme: portion, terme: 0
    };

    if (portion <= 0) return out;

    if (type === 'heloc') {
      const prime = parseFloat(sub.querySelector('[data-f=prime]').value) || 0;
      const premium = parseFloat(sub.querySelector('[data-f=premium]').value) || 0;
      const utilisee = parseFloat(sub.querySelector('[data-f=utilisee]')?.value) || 0;
      out.tauxEff = prime + premium;
      out.margeAutorisee = portion;
      out.portionUtilisee = Math.min(utilisee, portion); // ne dépasse pas l'autorisé
      out.capaciteDispo = Math.max(0, portion - out.portionUtilisee);
      // Intérêt mensuel sur ce qui est ACTUELLEMENT utilisé (peut être 0)
      out.mensuel = out.portionUtilisee * (out.tauxEff/100/12);
      out.hebdo = out.mensuel * 12 / 52;
      out.bihebdo = out.mensuel * 12 / 26;
      out.intAnnuel = out.mensuel * 12;
      // Estimation si pleine utilisation (pour info)
      out.mensuelMax = portion * (out.tauxEff/100/12);
    } else {
      const taux = parseFloat(sub.querySelector('[data-f=taux]').value) || 0;
      const amort = parseFloat(sub.querySelector('[data-f=amort]').value) || 0;
      const terme = parseFloat(sub.querySelector('[data-f=terme]').value) || 0;
      const freq = sub.querySelector('[data-f=freq]')?.value || 'mensuel';
      out.terme = terme;
      out.freq = freq;
      if (amort <= 0) return out;
      const tx = type === 'variable' ? tauxPeriodiqueVar(taux, 12) : tauxPeriodique(taux, 12);
      const nMens = amort * 12;
      const pmt = paiement(portion, tx, nMens);
      out.mensuel = pmt;
      out.hebdo = pmt / 4;
      out.bihebdo = pmt / 2;
      out.intAmort = pmt * nMens - portion;
      if (terme > 0 && terme <= amort) {
        const nTerme = terme * 12;
        const solde = soldeRestant(portion, tx, pmt, nTerme);
        out.soldeFinTerme = solde;
        out.intTerme = pmt * nTerme - (portion - solde);
      }
      const fInfo = {
        mensuel:        { lbl: 'Mensuel',              ppa: 12 },
        bihebdo_acc:    { lbl: 'Bi-hebdo accéléré',    ppa: 26, accel: true,  div: 2 },
        hebdo_acc:      { lbl: 'Hebdo accéléré',       ppa: 52, accel: true,  div: 4 },
        bihebdo:        { lbl: 'Bi-hebdo',             ppa: 26 },
        hebdo:          { lbl: 'Hebdo',                ppa: 52 },
        semimensuel:    { lbl: 'Semi-mensuel',         ppa: 24 }
      }[freq] || { lbl: 'Mensuel', ppa: 12 };
      out.freqLabel = fInfo.lbl;
      out.nbPaiementsAn = fInfo.ppa;
      if (fInfo.accel) {
        out.paiementFreq = pmt / fInfo.div;
      } else if (freq === 'mensuel') {
        out.paiementFreq = pmt;
      } else {
        const txFreq = type === 'variable' ? tauxPeriodiqueVar(taux, fInfo.ppa) : tauxPeriodique(taux, fInfo.ppa);
        const nFreq = amort * fInfo.ppa;
        out.paiementFreq = paiement(portion, txFreq, nFreq);
      }
    }
    return out;
  }

  // ============ AFFICHAGE D'UN SOUS-PRÊT ============
  function afficherSubpretResultats(sub) {
    const r = calculerSubpret(sub);

    const pctEl = sub.querySelector('[data-r=portionPct]');
    if (pctEl) pctEl.textContent = pretTotal > 0 ? ((r.portion/pretTotal)*100).toFixed(1) + ' %' : '—';

    if (r.type === 'heloc') {
      const tx = sub.querySelector('[data-r=tauxEff]'); if (tx) tx.textContent = fmtPct(r.tauxEff);
      const m = sub.querySelector('[data-r=mensuel]'); if (m) m.textContent = fmtCAD(r.mensuel);
      const cd = sub.querySelector('[data-r=capaciteDispo]'); if (cd) cd.textContent = fmtCAD(r.capaciteDispo);
      const mm = sub.querySelector('[data-r=mensuelMax]'); if (mm) mm.textContent = fmtCAD(r.mensuelMax);
    } else {
      const m = sub.querySelector('[data-r=paiementFreq]'); if (m) m.textContent = fmtCAD(r.paiementFreq || r.mensuel);
      const fl = sub.querySelector('[data-r=freqLabel]'); if (fl) fl.textContent = r.freqLabel || 'Mensuel';
      const it = sub.querySelector('[data-r=intTerme]'); if (it) it.textContent = r.terme > 0 ? fmtCAD(r.intTerme) : '—';
      const sf = sub.querySelector('[data-r=soldeFinTerme]'); if (sf) sf.textContent = r.terme > 0 ? fmtCAD(r.soldeFinTerme) : '—';
    }
  }

  // ============ AJOUT D'UN SOUS-PRÊT ============
  function ajouterSubpret(col, isFirst = false) {
    const subprets = col.querySelector('.subprets');
    const existing = subprets.querySelectorAll('.subpret');
    if (existing.length >= CONFIG.MAX_SUBPRETS) return;

    // Calculer le manque restant à attribuer (capital tiré) dans ce scénario (avant ajout)
    let manqueRestant = 0;
    if (!isFirst && pretTotal > 0) {
      let dejaTire = 0;
      existing.forEach(s => {
        const t = s.querySelector('[data-f=type]').value;
        if (t === 'heloc') {
          dejaTire += parseFloat(s.querySelector('[data-f=utilisee]')?.value) || 0;
        } else {
          dejaTire += parseFloat(s.querySelector('[data-f=portion]')?.value) || 0;
        }
      });
      manqueRestant = Math.max(0, pretTotal - dejaTire);
    }

    subId++;
    const sub = document.createElement('div');
    sub.className = 'subpret';
    sub.dataset.id = subId;
    // Stocker la valeur initiale qui sera lue par renderSubpretBody
    sub.dataset.portion = manqueRestant > 0 ? String(Math.round(manqueRestant)) : '0';
    sub.innerHTML = `
      <div class="subpret-header">
        <span class="subpret-num">Sous-prêt</span>
        <div style="display:flex; gap:8px; align-items:center;">
          <select data-f="type" class="subpret-type-select">
            <option value="terme">Prêt à terme</option>
            <option value="variable">Prêt variable</option>
            <option value="heloc">Marge (HELOC)</option>
          </select>
          <button class="remove-btn remove-sub" title="Retirer">×</button>
        </div>
      </div>
      <div class="subpret-body"></div>
    `;
    subprets.appendChild(sub);

    const select = sub.querySelector('[data-f=type]');
    select.addEventListener('change', () => {
      sub.dataset.portion = sub.querySelector('[data-f=portion]')?.value || '0';
      renderSubpretBody(sub, select.value);
      recalculerScenario(col);
      updateTotalGlobal();
    });

    sub.querySelector('.remove-sub').addEventListener('click', () => {
      const subs = col.querySelectorAll('.subpret');
      if (subs.length <= 1) return; // toujours au moins 1
      sub.remove();
      renumeroterSubprets(col);
      recalculerScenario(col);
      updateTotalGlobal();
    });

    renderSubpretBody(sub, 'terme');
    renumeroterSubprets(col);
    appliquerRestrictionsHeloc(col);
    if (isFirst) autoAttribuerSiSeule(col);
    recalculerScenario(col);
    updateTotalGlobal();

    // Si c'est un sous-prêt ajouté manuellement (pas le premier), focus + select sur le champ portion
    if (!isFirst) {
      const portionInput = sub.querySelector('[data-f=portion]');
      if (portionInput) {
        // Petit délai pour s'assurer que le DOM est prêt et que les animations sont passées
        setTimeout(() => {
          portionInput.focus();
          portionInput.select();
          // Scroll horizontal pour s'assurer que le sous-prêt est visible
          sub.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
        }, 100);
      }
    }
  }

  function renumeroterSubprets(col) {
    col.querySelectorAll('.subpret').forEach((s, i) => {
      const lettre = String.fromCharCode(65 + i);
      s.querySelector('.subpret-num').textContent = 'Sous-prêt ' + lettre;
      s.classList.remove('color-A', 'color-B', 'color-C', 'color-D', 'color-E');
      s.classList.add('color-' + lettre);
    });
    const subs = col.querySelectorAll('.subpret');
    const addBtn = col.querySelector('.add-sub-btn');
    if (addBtn) {
      addBtn.disabled = subs.length >= CONFIG.MAX_SUBPRETS;
      addBtn.textContent = subs.length >= CONFIG.MAX_SUBPRETS ? 'Maximum atteint' : '+ Sous-prêt';
    }
    subs.forEach(s => {
      const removeBtn = s.querySelector('.remove-sub');
      if (removeBtn) removeBtn.style.display = subs.length > 1 ? '' : 'none';
    });
  }

  // ============ RESTRICTIONS HELOC ============
  function helocBloqueDansAchat() {
    return currentTransactionType === 'achat' && currentMdfPct < 20;
  }

  function appliquerRestrictionsHeloc(col) {
    const helocBloque = helocBloqueDansAchat();
    col.querySelectorAll('.subpret').forEach(sub => {
      const select = sub.querySelector('[data-f=type]');
      const helocOpt = select?.querySelector('option[value=heloc]');
      if (!helocOpt) return;
      if (helocBloque) {
        helocOpt.disabled = true;
        helocOpt.textContent = 'HELOC — non dispo (achat <20% MDF)';
        if (select.value === 'heloc') {
          select.value = 'terme';
          renderSubpretBody(sub, 'terme');
        }
      } else {
        helocOpt.disabled = false;
        helocOpt.textContent = 'Marge (HELOC)';
      }
    });
  }

  // Vérifie les limites réglementaires d'un scénario :
  // - Total autorisé (prêts + marges HELOC) ≤ 80% VM
  // - Marges HELOC autorisées ≤ 65% VM
  function verifierLimitesScenario(col) {
    if (currentVm <= 0) return null;

    const subs = Array.from(col.querySelectorAll('.subpret'));
    let totalPretsTermeVar = 0;
    let totalMargeHeloc = 0;

    subs.forEach(s => {
      const type = s.querySelector('[data-f=type]').value;
      const portion = parseFloat(s.querySelector('[data-f=portion]').value) || 0;
      if (type === 'heloc') totalMargeHeloc += portion;
      else totalPretsTermeVar += portion;
    });

    const totalAutorise = totalPretsTermeVar + totalMargeHeloc;
    const max80 = currentVm * 0.80;
    const max65 = currentVm * 0.65;

    // Limite 65% sur les marges HELOC
    if (totalMargeHeloc > max65) {
      return `Total marges HELOC max 65 % VM : ${fmtCAD(max65)} (excédent ${fmtCAD(totalMargeHeloc - max65)})`;
    }
    // Limite 80% sur tout le montage (sauf si SCHL : seul le total des prêts utilisés peut dépasser 80%)
    // En achat assuré (mdfPct < 20), la marge n'est pas permise (déjà bloquée), donc cette limite s'applique seulement en conventionnel.
    if (currentMdfPct >= 20 && totalAutorise > max80) {
      return `Total prêt + marge max 80 % VM : ${fmtCAD(max80)} (excédent ${fmtCAD(totalAutorise - max80)})`;
    }
    return null;
  }

  // ============ AUTO-ATTRIBUTION ============
  function autoAttribuerSiSeule(col) {
    const subs = col.querySelectorAll('.subpret');
    if (subs.length === 1 && pretTotal > 0) {
      const sub = subs[0];
      const type = sub.querySelector('[data-f=type]').value;
      const portionInput = sub.querySelector('[data-f=portion]');
      const utiliseeInput = sub.querySelector('[data-f=utilisee]');
      if (!portionInput) return;
      const portion = parseFloat(portionInput.value) || 0;
      if (portion === 0) {
        portionInput.value = Math.round(pretTotal);
        // Si HELOC, mettre aussi la portion utilisée à plein pour que ça balance
        if (type === 'heloc' && utiliseeInput) {
          utiliseeInput.value = Math.round(pretTotal);
        }
      }
    }
  }

  // ============ RECALCUL D'UN SCÉNARIO ============
  function recalculerScenario(col) {
    let capitalTire = 0;       // Prêts terme/var + portions HELOC UTILISÉES (= ce qui doit balancer avec prêt total)
    let totalMensuel = 0, totalHebdo = 0, totalBihebdo = 0;
    let totalIntTerme = 0, totalIntAmort = 0;
    let countTermeVar = 0;
    let aSousPretZero = false;  // Détecter sous-prêts avec portion à 0

    col.querySelectorAll('.subpret').forEach(sub => {
      const port = parseFloat(sub.querySelector('[data-f=portion]')?.value) || 0;
      if (port <= 0) aSousPretZero = true;
      afficherSubpretResultats(sub);
      const r = calculerSubpret(sub);
      // Capital effectivement tiré au déboursement
      if (r.type === 'heloc') {
        capitalTire += r.portionUtilisee || 0;
      } else {
        capitalTire += r.portion;
      }
      totalMensuel += r.mensuel;
      totalHebdo += r.hebdo;
      totalBihebdo += r.bihebdo;
      if (r.type !== 'heloc') {
        countTermeVar++;
        totalIntAmort += r.intAmort;
        totalIntTerme += r.intTerme;
      }
    });

    col.dataset.totalMensuel = totalMensuel;
    col.dataset.capitalTire = capitalTire;

    // Affichage paiement par fréquence (gère aussi intérêts + total des paiements)
    afficherPaiementsScenario(col);
    col.querySelector('[data-r=scenAttribue]').textContent = fmtCAD(capitalTire) + ' / ' + fmtCAD(pretTotal);

    // Barre + statut basés sur le CAPITAL TIRÉ (pas la somme des portions)
    const bar = col.querySelector('[data-r=scenBar]');
    const status = col.querySelector('[data-r=scenStatus]');
    const ratio = pretTotal > 0 ? capitalTire / pretTotal : 0;
    const diff = pretTotal - capitalTire;
    const tolerance = 1;

    bar.classList.remove('over', 'complete');
    if (ratio > 1) {
      bar.style.width = '100%';
      bar.classList.add('over');
    } else {
      bar.style.width = (ratio * 100).toFixed(1) + '%';
      if (Math.abs(diff) <= tolerance && pretTotal > 0) bar.classList.add('complete');
    }

    // Vérifier limite HELOC seul
    const helocAlert = verifierLimitesScenario(col);

    // Reset des états visuels
    col.classList.remove('invalid');
    col.classList.remove('valid');

    if (pretTotal <= 0) {
      status.style.display = 'none';
    } else if (helocAlert) {
      status.style.display = '';
      status.innerHTML = '<span class="status-title">⚠ Limite réglementaire dépassée</span>'
        + '<span class="status-detail">' + helocAlert + '</span>'
        + '<span class="status-action">Réduis les portions ou retire un sous-prêt.</span>';
      status.className = 'attrib-status over';
      col.classList.add('invalid');
    } else if (aSousPretZero) {
      status.style.display = '';
      status.innerHTML = '<span class="status-title">⚠ Sous-prêt à 0 $</span>'
        + '<span class="status-detail">Un ou plusieurs sous-prêts ont une portion de 0 $.</span>'
        + '<span class="status-action">Saisis un montant pour chaque sous-prêt, ou retire-le avec le bouton ×.</span>';
      status.className = 'attrib-status under';
      col.classList.add('invalid');
    } else if (Math.abs(diff) <= tolerance) {
      status.style.display = '';
      status.innerHTML = '<span class="status-title">✓ Attribution complète</span>'
        + '<span class="status-detail">Le capital tiré couvre exactement le prêt requis au déboursement.</span>';
      status.className = 'attrib-status ok';
      col.classList.add('valid');
    } else if (diff > 0) {
      // Manque de capital tiré : trouver le meilleur sous-prêt à augmenter
      const subs = Array.from(col.querySelectorAll('.subpret'));
      // Cherche un HELOC avec capacité disponible
      let helocAvecCapacite = null;
      subs.forEach(s => {
        const t = s.querySelector('[data-f=type]').value;
        if (t === 'heloc') {
          const r = calculerSubpret(s);
          if (r.capaciteDispo >= diff && !helocAvecCapacite) helocAvecCapacite = { sub: s, r };
        }
      });

      let action;
      if (helocAvecCapacite) {
        const idx = subs.indexOf(helocAvecCapacite.sub);
        const lettre = String.fromCharCode(65 + idx);
        action = 'Augmente la <strong>portion utilisée</strong> du HELOC (sous-prêt ' + lettre + ') de ' + fmtCAD(diff) + ' pour balancer.';
      } else if (subs.length === 1) {
        const t = subs[0].querySelector('[data-f=type]').value;
        if (t === 'heloc') {
          action = 'Augmente la <strong>portion utilisée</strong> du HELOC de ' + fmtCAD(diff) + ', ou augmente la marge autorisée si insuffisante.';
        } else {
          action = 'Augmente la portion du sous-prêt A de ' + fmtCAD(diff) + ', ou ajoute un nouveau sous-prêt.';
        }
      } else {
        action = 'Augmente la portion d\'un sous-prêt de ' + fmtCAD(diff) + ' au total (pour un HELOC, c\'est la portion utilisée), ou ajoute un nouveau sous-prêt.';
      }

      status.style.display = '';
      status.innerHTML = '<span class="status-title">⚠ Manque ' + fmtCAD(diff) + ' au déboursement</span>'
        + '<span class="status-detail">Le capital tiré (prêts + portions HELOC utilisées) est inférieur au prêt requis de ' + fmtCAD(pretTotal) + '.</span>'
        + '<span class="status-action">' + action + '</span>';
      status.className = 'attrib-status under';
      col.classList.add('invalid');
    } else {
      // Excédent : suggérer où réduire
      const surplus = -diff;
      const subs = Array.from(col.querySelectorAll('.subpret'));
      // Cherche un HELOC avec portion utilisée > 0
      let helocAvecUsage = null;
      subs.forEach(s => {
        const t = s.querySelector('[data-f=type]').value;
        if (t === 'heloc') {
          const r = calculerSubpret(s);
          if (r.portionUtilisee >= surplus && !helocAvecUsage) helocAvecUsage = { sub: s, r };
        }
      });

      let action;
      if (helocAvecUsage) {
        const idx = subs.indexOf(helocAvecUsage.sub);
        const lettre = String.fromCharCode(65 + idx);
        action = 'Réduis la <strong>portion utilisée</strong> du HELOC (sous-prêt ' + lettre + ') de ' + fmtCAD(surplus) + '.';
      } else if (subs.length === 1) {
        action = 'Réduis la portion du sous-prêt A de ' + fmtCAD(surplus) + '.';
      } else {
        action = 'Réduis la portion d\'un sous-prêt de ' + fmtCAD(surplus) + ' au total (pour un HELOC, c\'est la portion utilisée).';
      }

      status.style.display = '';
      status.innerHTML = '<span class="status-title">✗ Excédent de ' + fmtCAD(surplus) + ' au déboursement</span>'
        + '<span class="status-detail">Le capital tiré dépasse le prêt requis de ' + fmtCAD(pretTotal) + '.</span>'
        + '<span class="status-action">' + action + '</span>';
      status.className = 'attrib-status over';
      col.classList.add('invalid');
    }

    // Mise à jour temps réel du deep dive si ce scénario est celui qui est ouvert
    try {
      if (ddCurrentCol && ddPanel && ddPanel.classList.contains('open')) {
        // Comparer par dataset.id pour être robuste
        if (ddCurrentCol.dataset.id === col.dataset.id) {
          rendreDeepDive();
        }
      }
    } catch (e) {
      // Silencieux : si ddCurrentCol/ddPanel pas encore défini au démarrage
    }
  }

  // ============ AJOUT D'UN SCÉNARIO (COLONNE) ============
  function ajouterColonne() {
    const cols = wrap.querySelectorAll('.col');
    if (cols.length >= CONFIG.MAX_COLS) return;

    colId++;
    const col = document.createElement('div');
    col.className = 'col';
    col.dataset.id = colId;
    col.innerHTML = `
      <div class="col-header">
        <span class="col-num">Scénario</span>
        <button class="remove-btn" title="Retirer ce scénario">×</button>
      </div>
      <div class="subprets"></div>
      <button class="add-sub-btn" type="button">+ Sous-prêt</button>
      <div class="scen-summary">
        <div class="scen-summary-title">Total scénario</div>
        <div class="info-row">
          <span class="lbl">Attribué</span>
          <span class="val" data-r="scenAttribue">—</span>
        </div>
        <div class="attrib-bar"><div class="attrib-bar-fill" data-r="scenBar"></div></div>
        <div class="attrib-status" data-r="scenStatus" style="display:none;">—</div>
        <div class="scen-results">
          <div class="scen-row primary" data-r="scenPaiementsByFreq">
            <span class="lbl">Paiement</span><span class="val" data-r="scenPaiement">—</span>
          </div>
          <div class="scen-row"><span class="lbl">Intérêt sur terme</span><span class="val" data-r="scenIntTerme">—</span></div>
          <div class="scen-row"><span class="lbl">Intérêt sur amort.</span><span class="val" data-r="scenIntAmort">—</span></div>
          <div class="scen-row" style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px;"><span class="lbl" style="color:var(--gold);font-weight:600;">Total des paiements</span><span class="val" data-r="scenTotalPaiements" style="color:var(--gold);font-weight:600;">—</span></div>
        </div>
        <button class="deep-dive-btn" type="button" data-r="deepDive">
          Analyse détaillée <span class="arrow">→</span>
        </button>
      </div>
    `;
    // Insérer la colonne juste avant le bouton + s'il existe, sinon à la fin
    if (addBtn.parentElement === wrap) {
      wrap.insertBefore(col, addBtn);
    } else {
      wrap.appendChild(col);
    }

    col.querySelector('.remove-btn').addEventListener('click', () => {
      // Si on retire le scénario actif du deep dive, fermer le panneau
      if (ddCurrentCol === col && ddPanel.classList.contains('open')) {
        fermerDeepDive();
      }
      col.remove();
      renumeroterColonnes();
      updateTotalGlobal();
      // Si le panneau est encore ouvert sur un autre scénario, mettre à jour le compteur
      if (ddPanel.classList.contains('open')) updateNavButtons();
    });
    col.querySelector('.add-sub-btn').addEventListener('click', () => ajouterSubpret(col));
    col.querySelector('[data-r=deepDive]').addEventListener('click', () => {
      if (ddPanel.classList.contains('open')) {
        switchDeepDive(col);
      } else {
        ouvrirDeepDive(col);
      }
    });

    ajouterSubpret(col, true);
    renumeroterColonnes();

  // ============ AFFICHAGE PAIEMENTS PAR FRÉQUENCE + TOTAL ============
  function afficherPaiementsScenario(col) {
    const scenResults = col.querySelector('.scen-results');
    if (!scenResults) return;

    // Grouper les paiements par fréquence (uniquement pour terme/variable)
    // Le HELOC est toujours mensuel (intérêt seulement)
    const paiementsParFreq = {}; // { 'mensuel': { lbl: 'Mensuel', total: X }, ... }
    let totalIntTerme = 0, totalIntAmort = 0, totalPaiements = 0;
    let helocInteretMensuel = 0;

    col.querySelectorAll('.subpret').forEach(sub => {
      const r = calculerSubpret(sub);
      if (r.type === 'heloc') {
        // HELOC : intérêt mensuel sur portion utilisée
        helocInteretMensuel += r.mensuel || 0;
        // Total des paiements HELOC sur amort = intérêt × 12 × 25 (estimation 25 ans)
        totalPaiements += (r.mensuel || 0) * 12 * 25;
      } else {
        const freq = r.freq || 'mensuel';
        const lbl = r.freqLabel || 'Mensuel';
        if (!paiementsParFreq[freq]) {
          paiementsParFreq[freq] = { lbl, total: 0 };
        }
        paiementsParFreq[freq].total += r.paiementFreq || r.mensuel || 0;
        totalIntTerme += r.intTerme || 0;
        totalIntAmort += r.intAmort || 0;
        // Total des paiements = paiement × ppa × amort
        const amort = parseFloat(sub.querySelector('[data-f=amort]').value) || 0;
        totalPaiements += (r.paiementFreq || r.mensuel || 0) * (r.nbPaiementsAn || 12) * amort;
      }
    });

    // Construire le HTML des lignes de paiement
    const freqEntries = Object.entries(paiementsParFreq);
    let paiementsHtml = '';
    if (freqEntries.length === 0 && helocInteretMensuel === 0) {
      paiementsHtml = '<div class="scen-row primary"><span class="lbl">Paiement</span><span class="val">—</span></div>';
    } else {
      freqEntries.forEach(([freq, data], idx) => {
        const cls = idx === 0 ? 'scen-row primary' : 'scen-row';
        paiementsHtml += '<div class="' + cls + '"><span class="lbl">' + data.lbl + '</span><span class="val">' + fmtCAD(data.total) + '</span></div>';
      });
      if (helocInteretMensuel > 0) {
        const cls = freqEntries.length === 0 ? 'scen-row primary' : 'scen-row';
        paiementsHtml += '<div class="' + cls + '"><span class="lbl">Mensuel (HELOC int.)</span><span class="val">' + fmtCAD(helocInteretMensuel) + '</span></div>';
      }
    }

    // Lignes intérêt
    paiementsHtml += '<div class="scen-row"><span class="lbl">Intérêt sur terme</span><span class="val">' + (totalIntTerme > 0 ? fmtCAD(totalIntTerme) : '—') + '</span></div>';
    paiementsHtml += '<div class="scen-row"><span class="lbl">Intérêt sur amort.</span><span class="val">' + (totalIntAmort > 0 ? fmtCAD(totalIntAmort) : '—') + '</span></div>';

    // Ligne TOTAL en or
    paiementsHtml += '<div class="scen-row" style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px;"><span class="lbl" style="color:var(--gold);font-weight:600;">Total des paiements</span><span class="val" style="color:var(--gold);font-weight:600;">' + fmtCAD(totalPaiements) + '</span></div>';

    scenResults.innerHTML = paiementsHtml;
  }

  // ============ PANNEAU GLOBAL ============
  function recalculerGlobal() {
    const vm = parseFloat(gVm.value) || 0;
    let mdf = parseFloat(gMdf.value) || 0;
    if (mdf > vm) mdf = vm;
    const type = gType.value;

    if (vm > 0) {
      let mdfMin = 0, alertMsg = null;

      if (type === 'refi') {
        mdfMin = vm * 0.20;
        if (mdf < mdfMin) {
          alertMsg = '<strong>Limite refi 80 %.</strong> Le refinancement est plafonné à 80 % de la valeur marchande. Équité minimum : 20 %.';
        }
      } else {
        mdfMin = miseDeFondsMinimumAchat(vm);
        if (mdf < mdfMin) {
          if (vm > 1500000) {
            alertMsg = '<strong>Propriété > 1,5 M$.</strong> Aucune assurance prêt disponible. Mise de fonds minimum : 20 % (prêt conventionnel).';
          } else if (vm > 500000) {
            alertMsg = '<strong>Règle 5/10.</strong> Propriété > 500 000 $ : 5 % sur le premier 500 000 $ + 10 % sur l\'excédent. Minimum requis : ' + fmtCAD(mdfMin) + ' (' + (mdfMin/vm*100).toFixed(2) + ' %).';
          } else {
            alertMsg = '<strong>Mise de fonds minimum 5 %.</strong> Pour une propriété ≤ 500 000 $.';
          }
        }
      }

      if (mdf < mdfMin) {
        mdf = mdfMin;
        gMdf.value = Math.round(mdf);
        gMdfPct.value = ((mdf/vm)*100).toFixed(2);
      }

      if (alertMsg) { gAlert.innerHTML = alertMsg; gAlert.classList.add('show'); }
      else gAlert.classList.remove('show');
    } else {
      gAlert.classList.remove('show');
    }

    const mdfPct = vm > 0 ? (mdf/vm)*100 : 0;
    const pretBase = vm - mdf;
    let primeRate = 0, primeMnt = 0;
    if (type === 'achat' && pretBase > 0) {
      const r = primeSCHL(mdfPct);
      if (r !== null) { primeRate = r; primeMnt = pretBase * r; }
    }

    pretTotal = pretBase + primeMnt;
    currentTransactionType = type;
    currentMdfPct = mdfPct;
    currentVm = vm;

    gPretBase.textContent = fmtCAD(pretBase);
    if (type === 'refi') { gPrimePct.textContent = 'N/A (refi)'; gPrimeMnt.textContent = '—'; }
    else if (mdfPct < 5 && pretBase > 0) { gPrimePct.textContent = '< 5 % non admis'; gPrimeMnt.textContent = '—'; }
    else { gPrimePct.textContent = (primeRate*100).toFixed(2) + ' %'; gPrimeMnt.textContent = fmtCAD(primeMnt); }
    gPretTotal.textContent = fmtCAD(pretTotal);
    gRatio.textContent = vm > 0 ? fmtPct(pretTotal/vm*100) : '—';

    wrap.querySelectorAll('.col').forEach(col => {
      autoAttribuerSiSeule(col);
      appliquerRestrictionsHeloc(col);
      recalculerScenario(col);
    });
    updateTotalGlobal();
  }
