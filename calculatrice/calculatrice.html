  // ============ CALCUL AMORTISSEMENT MOIS PAR MOIS ============
  // Génère la trajectoire complète d'un sous-prêt (terme/variable seulement)
  // Retourne: [{mois, capital_debut, paiement, interet, capital_remb, versement, capital_fin}]
  function genererAmortissementSubpret(sub, versementsPourSub) {
    const type = sub.querySelector('[data-f=type]').value;
    if (type === 'heloc') return [];

    const portion = parseFloat(sub.querySelector('[data-f=portion]').value) || 0;
    const taux = parseFloat(sub.querySelector('[data-f=taux]').value) || 0;
    const amort = parseFloat(sub.querySelector('[data-f=amort]').value) || 0;
    if (portion <= 0 || amort <= 0) return [];

    const tx = (type === 'variable') ? tauxPeriodiqueVar(taux, 12) : tauxPeriodique(taux, 12);
    const nMens = amort * 12;
    const pmt = paiement(portion, tx, nMens);

    const lignes = [];
    let solde = portion;
    for (let mois = 1; mois <= nMens && solde > 0.01; mois++) {
      const interet = solde * tx;
      let capRemb = pmt - interet;
      let versement = 0;

      // Appliquer un versement si prévu pour ce mois
      const v = versementsPourSub.find(vv => vv.mois === mois);
      if (v) versement = Math.min(v.montant, solde - capRemb);

      // Ne pas rembourser plus que le solde
      if (capRemb + versement > solde) {
        capRemb = Math.max(0, solde - versement);
        if (versement > solde) versement = solde;
      }

      const capitalFin = solde - capRemb - versement;
      lignes.push({ mois, capital_debut: solde, paiement: pmt, interet, capital_remb: capRemb, versement, capital_fin: capitalFin });
      solde = capitalFin;
      if (solde < 0.01) break;
    }
    return lignes;
  }

  // Pour un scénario complet, retourne deux trajectoires combinées : sans versements et avec versements
  function genererTrajectoireScenario(col, versements) {
    const allSubs = Array.from(col.querySelectorAll('.subpret'));
    const subs = allSubs.filter(s => s.querySelector('[data-f=type]').value !== 'heloc');

    // Récupérer aussi les HELOC pour les afficher comme ligne plate dans le graphique
    const helocs = allSubs.filter(s => s.querySelector('[data-f=type]').value === 'heloc')
      .map(s => {
        // Garder l'index global du HELOC dans la liste totale (pour la couleur)
        const globalIdx = allSubs.indexOf(s);
        const utilisee = parseFloat(s.querySelector('[data-f=utilisee]')?.value) || 0;
        const portion = parseFloat(s.querySelector('[data-f=portion]')?.value) || 0; // marge autorisée
        const prime = parseFloat(s.querySelector('[data-f=prime]')?.value) || 0;
        const premium = parseFloat(s.querySelector('[data-f=premium]')?.value) || 0;
        const tauxAnnuel = prime + premium;
        const interetMensuel = utilisee * (tauxAnnuel / 100) / 12;
        const interetAnnuel = utilisee * (tauxAnnuel / 100);
        return {
          globalIdx,
          lettre: String.fromCharCode(65 + globalIdx),
          utilisee,
          autorisee: portion,
          tauxAnnuel,
          interetMensuel,
          interetAnnuel
        };
      });

    if (subs.length === 0) {
      return { sans: [], avec: [], maxMois: 0, trajParSub: [], helocs };
    }

    let maxMois = 0;
    const trajParSub = subs.map((sub, idx) => {
      const versPourSub = (versements || []).filter(v => v.subpretIdx === idx);
      const sans = genererAmortissementSubpret(sub, []);
      const avec = genererAmortissementSubpret(sub, versPourSub);
      maxMois = Math.max(maxMois, sans.length, avec.length);
      // Mémoriser l'index global du sous-prêt amortissable dans la liste totale
      const globalIdx = allSubs.indexOf(sub);
      return { sans, avec, globalIdx, lettre: String.fromCharCode(65 + globalIdx) };
    });

    const sans = [], avec = [];
    for (let m = 1; m <= maxMois; m++) {
      let totalSans = 0, totalAvec = 0;
      trajParSub.forEach(t => {
        const lSans = t.sans[m - 1];
        const lAvec = t.avec[m - 1];
        totalSans += lSans ? lSans.capital_fin : 0;
        totalAvec += lAvec ? lAvec.capital_fin : 0;
      });
      sans.push({ mois: m, solde: totalSans });
      avec.push({ mois: m, solde: totalAvec });
    }

    return { sans, avec, maxMois, trajParSub, helocs };
  }

  // ============ DISTRIBUTION VERSEMENTS PAR MOIS ============
  // Convertit les versements (avec leur fréquence) en liste {mois, montant, subpretIdx}
  function distribuerVersements(versements, dateDepart) {
    // dateDepart = date du premier paiement (par défaut: aujourd'hui)
    const ref = dateDepart || new Date();
    const out = [];
    versements.forEach(v => {
      const dateV = new Date(v.date);
      const moisDiff = (dateV.getFullYear() - ref.getFullYear()) * 12 + (dateV.getMonth() - ref.getMonth());
      if (moisDiff < 1) return; // Versement dans le passé, ignorer

      if (v.frequence === 'ponctuel') {
        out.push({ mois: moisDiff, montant: v.montant, subpretIdx: v.subpretIdx || 0 });
      } else {
        // Répéter selon fréquence sur 35 ans (max amortissement)
        const intervalle = { mensuel: 1, trimestriel: 3, semestriel: 6, annuel: 12 }[v.frequence] || 12;
        for (let m = moisDiff; m <= 35 * 12; m += intervalle) {
          out.push({ mois: m, montant: v.montant, subpretIdx: v.subpretIdx || 0 });
        }
      }
    });
    return out;
  }

  // ============ GRAPHIQUE SVG D'AMORTISSEMENT ============
  const SUBPRET_COLORS = ['#50AACE', '#D5A05F', '#6fde9c', '#C792EA', '#FF9F45'];

  function genererGraphique(traj) {
    const container = document.getElementById('dd-chart');
    const aDesAmortissables = traj && traj.trajParSub && traj.trajParSub.length > 0;
    const aDesHelocs = traj && traj.helocs && traj.helocs.length > 0;

    if (!aDesAmortissables && !aDesHelocs) {
      container.innerHTML = '<div class="dd-chart-placeholder">Aucun prêt dans ce scénario.</div>';
      return;
    }

    // Si pas de prêt amortissable mais HELOC : on simule un graphique court (10 ans)
    const maxMois = aDesAmortissables ? traj.maxMois : 120;
    let maxSolde = 0;
    if (aDesAmortissables) {
      traj.trajParSub.forEach(t => { t.sans.forEach(p => maxSolde = Math.max(maxSolde, p.capital_fin)); });
      traj.sans.forEach(p => maxSolde = Math.max(maxSolde, p.solde));
    }
    if (aDesHelocs) {
      traj.helocs.forEach(h => maxSolde = Math.max(maxSolde, h.autorisee));
    }
    if (maxSolde === 0) maxSolde = 100000;

    const W = 800, H = 380, padL = 60, padR = 20, padT = 20, padB = 50;
    const innerW = W - padL - padR;
    const innerH = H - padT - padB;
    const xScale = m => padL + (m / maxMois) * innerW;
    const yScale = s => padT + innerH - (s / maxSolde) * innerH;

    // Courbes des sous-prêts amortissables (utilisent globalIdx pour la couleur)
    const subPaths = aDesAmortissables ? traj.trajParSub.map(t => {
      const color = SUBPRET_COLORS[t.globalIdx % SUBPRET_COLORS.length];
      let pathAvec = '', pathSans = '';
      if (t.avec.length > 0) {
        pathAvec = 'M ' + xScale(1) + ' ' + yScale(t.avec[0].capital_fin);
        for (let i = 1; i < t.avec.length; i++) pathAvec += ' L ' + xScale(i + 1) + ' ' + yScale(t.avec[i].capital_fin);
      }
      if (t.sans.length > 0) {
        pathSans = 'M ' + xScale(1) + ' ' + yScale(t.sans[0].capital_fin);
        for (let i = 1; i < t.sans.length; i++) pathSans += ' L ' + xScale(i + 1) + ' ' + yScale(t.sans[i].capital_fin);
      }
      return { color, pathAvec, pathSans, lettre: t.lettre };
    }) : [];

    // Lignes HELOC : pointillée pour utilisée (épaisse) + ligne fine pour limite autorisée
    const helocLines = aDesHelocs ? traj.helocs.map(h => {
      const color = SUBPRET_COLORS[h.globalIdx % SUBPRET_COLORS.length];
      const yUtil = yScale(h.utilisee);
      const yAuto = yScale(h.autorisee);
      return { color, yUtil, yAuto, lettre: h.lettre, utilisee: h.utilisee, autorisee: h.autorisee, taux: h.tauxAnnuel };
    }) : [];

    let pathTotalAvec = '', pathTotalSans = '';
    if (aDesAmortissables) {
      pathTotalAvec = 'M ' + xScale(1) + ' ' + yScale(traj.avec[0].solde);
      for (let i = 1; i < traj.avec.length; i++) pathTotalAvec += ' L ' + xScale(i + 1) + ' ' + yScale(traj.avec[i].solde);
      pathTotalSans = 'M ' + xScale(1) + ' ' + yScale(traj.sans[0].solde);
      for (let i = 1; i < traj.sans.length; i++) pathTotalSans += ' L ' + xScale(i + 1) + ' ' + yScale(traj.sans[i].solde);
    }

    const yTicks = [];
    const stepY = maxSolde > 1000000 ? 200000 : 100000;
    for (let v = 0; v <= maxSolde; v += stepY) yTicks.push({ v, y: yScale(v) });
    const xTicks = [];
    for (let a = 0; a * 12 <= maxMois; a += 5) xTicks.push({ a, x: xScale(a * 12 || 1) });
    if (xTicks[xTicks.length - 1].a * 12 < maxMois) xTicks.push({ a: Math.ceil(maxMois / 12), x: xScale(maxMois) });

    // Légende : amortissables + HELOC + total
    const legendItems = [];
    if (aDesAmortissables) {
      traj.trajParSub.forEach(t => {
        legendItems.push({ color: SUBPRET_COLORS[t.globalIdx % SUBPRET_COLORS.length], label: 'Sous-prêt ' + t.lettre });
      });
    }
    if (aDesHelocs) {
      traj.helocs.forEach(h => {
        legendItems.push({ color: SUBPRET_COLORS[h.globalIdx % SUBPRET_COLORS.length], label: h.lettre + ' (HELOC)', dashed: true });
      });
    }
    if (aDesAmortissables) {
      legendItems.push({ color: '#FFFFFF', label: 'Total scénario', bold: true });
    }

    const svg = `
<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:auto; max-height:400px; background:rgba(0,0,0,0.20); border:1px solid var(--border); border-radius:12px;">
  ${yTicks.map(t => `
    <line x1="${padL}" y1="${t.y}" x2="${W - padR}" y2="${t.y}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="${padL - 8}" y="${t.y + 4}" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11" font-family="Montserrat, sans-serif">${(t.v/1000).toFixed(0)}k</text>
  `).join('')}

  ${subPaths.map(s => `
    ${s.pathSans ? `<path d="${s.pathSans}" fill="none" stroke="${s.color}" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>` : ''}
    ${s.pathAvec ? `<path d="${s.pathAvec}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round"/>` : ''}
  `).join('')}

  ${helocLines.map(h => `
    <!-- Ligne fine pour la limite autorisée -->
    <line x1="${padL}" y1="${h.yAuto}" x2="${W - padR}" y2="${h.yAuto}" stroke="${h.color}" stroke-width="1" opacity="0.45" stroke-dasharray="2,2"/>
    <text x="${W - padR - 4}" y="${h.yAuto - 4}" text-anchor="end" fill="${h.color}" font-size="9" opacity="0.7" font-family="Montserrat, sans-serif">${h.lettre} limite ${(h.autorisee/1000).toFixed(0)}k</text>
    <!-- Ligne pointillée épaisse pour la portion utilisée (intérêt seulement) -->
    <line x1="${padL}" y1="${h.yUtil}" x2="${W - padR}" y2="${h.yUtil}" stroke="${h.color}" stroke-width="2.5" stroke-dasharray="8,5"/>
    <text x="${padL + 8}" y="${h.yUtil - 4}" fill="${h.color}" font-size="10" font-weight="600" font-family="Montserrat, sans-serif">${h.lettre} HELOC ${(h.utilisee/1000).toFixed(0)}k @ ${h.taux.toFixed(2)}%</text>
  `).join('')}

  ${pathTotalSans ? `<path d="${pathTotalSans}" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-dasharray="6,4"/>` : ''}
  ${pathTotalAvec ? `<path d="${pathTotalAvec}" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round"/>` : ''}

  ${xTicks.map(t => `
    <line x1="${t.x}" y1="${padT + innerH}" x2="${t.x}" y2="${padT + innerH + 4}" stroke="rgba(255,255,255,0.3)"/>
    <text x="${t.x}" y="${padT + innerH + 18}" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-family="Montserrat, sans-serif">${t.a} an${t.a > 1 ? 's' : ''}</text>
  `).join('')}

  <g transform="translate(${padL + 10}, ${padT + 10})">
    <rect width="190" height="${24 + legendItems.length * 16}" fill="rgba(0,0,0,0.55)" rx="6"/>
    <text x="10" y="18" fill="rgba(255,255,255,0.85)" font-size="10" font-weight="600" letter-spacing="0.1em" font-family="Montserrat, sans-serif">LÉGENDE</text>
    ${legendItems.map((item, i) => `
      <line x1="10" y1="${32 + i * 16}" x2="30" y2="${32 + i * 16}" stroke="${item.color}" stroke-width="${item.bold ? 3 : 2}" ${item.dashed ? 'stroke-dasharray="6,3"' : ''}/>
      <text x="36" y="${36 + i * 16}" fill="rgba(255,255,255,0.85)" font-size="11" font-family="Montserrat, sans-serif"${item.bold ? ' font-weight="600"' : ''}>${item.label}</text>
    `).join('')}
  </g>
</svg>
    `;
    container.innerHTML = svg;
  }

  // ============ CALCUL DES ÉCONOMIES ============
  function calculerEconomies(traj) {
    if (!traj || !traj.trajParSub || traj.trajParSub.length === 0) {
      return { interets: 0, moisGagnes: 0, dateFinSans: null, dateFinAvec: null };
    }

    let interetsSans = 0, interetsAvec = 0;
    let moisFinSans = 0, moisFinAvec = 0;

    traj.trajParSub.forEach(t => {
      t.sans.forEach(l => interetsSans += l.interet);
      t.avec.forEach(l => interetsAvec += l.interet);
      moisFinSans = Math.max(moisFinSans, t.sans.length);
      moisFinAvec = Math.max(moisFinAvec, t.avec.length);
    });

    const economiseInterets = interetsSans - interetsAvec;
    const moisGagnes = moisFinSans - moisFinAvec;

    const today = new Date();
    const dateFinSans = new Date(today.getFullYear(), today.getMonth() + moisFinSans, 1);
    const dateFinAvec = new Date(today.getFullYear(), today.getMonth() + moisFinAvec, 1);

    return { interets: economiseInterets, moisGagnes, dateFinSans, dateFinAvec };
  }

  // ============ CALCUL PÉNALITÉ (3 mois d'intérêts ou IRD) ============
  // Estimation grossière : on prend le sous-prêt avec le plus gros solde et son taux
  // Pénalité = max(3 mois d'intérêts, IRD)
  // IRD = (taux contractuel - taux comparable actuel) × solde × terme restant en années
  function calculerPenalite(col, totalVersementsExces) {
    if (totalVersementsExces <= 0) return 0;
    const subs = Array.from(col.querySelectorAll('.subpret'))
      .filter(s => s.querySelector('[data-f=type]').value !== 'heloc');
    if (subs.length === 0) return 0;

    // Prendre le sous-prêt principal (plus gros)
    let mainSub = subs[0], maxPort = 0;
    subs.forEach(s => {
      const p = parseFloat(s.querySelector('[data-f=portion]').value) || 0;
      if (p > maxPort) { maxPort = p; mainSub = s; }
    });
    const taux = parseFloat(mainSub.querySelector('[data-f=taux]').value) || 0;
    const terme = parseFloat(mainSub.querySelector('[data-f=terme]').value) || 5;

    // Pénalité 3 mois d'intérêts sur le montant en excès
    const trois_mois = totalVersementsExces * (taux / 100) / 4;

    // IRD : suppose un différentiel de 1.5% (estimation)
    const differentiel = 0.015;
    const termeRestantAnnees = Math.max(1, terme); // estimation
    const ird = totalVersementsExces * differentiel * termeRestantAnnees;

    return Math.max(trois_mois, ird);
  }

  // ============ FONCTION PRINCIPALE DE RENDU ============
  function rendreDeepDive() {
    if (!ddCurrentCol) return;

    // Distribuer les versements selon leur fréquence
    const versementsDistribues = distribuerVersements(ddVersements);

    // Générer la trajectoire combinée
    const traj = genererTrajectoireScenario(ddCurrentCol, versementsDistribues);

    // Graphique
    genererGraphique(traj);

    // Économies
    const eco = calculerEconomies(traj);
    document.getElementById('dd-stat-interets').textContent = eco.interets > 0 ? fmtCAD(eco.interets) : '—';
    if (eco.moisGagnes > 0) {
      const ans = Math.floor(eco.moisGagnes / 12);
      const mois = eco.moisGagnes % 12;
      document.getElementById('dd-stat-temps').textContent =
        (ans > 0 ? ans + ' an' + (ans > 1 ? 's' : '') : '') +
        (mois > 0 ? (ans > 0 ? ' ' : '') + mois + ' mois' : ans === 0 ? '0 mois' : '');
    } else {
      document.getElementById('dd-stat-temps').textContent = '—';
    }
    if (eco.dateFinAvec) {
      document.getElementById('dd-stat-date').textContent = eco.dateFinAvec.toLocaleDateString('fr-CA', { year: 'numeric', month: 'short' });
    } else {
      document.getElementById('dd-stat-date').textContent = '—';
    }

    // === Liste des versements ===
    rendreListeVersements();

    // === Sélecteur de sous-prêts dans le formulaire ===
    rendreSelecteurSubprets();

    // === Tableau d'amortissement ===
    rendreTableauAmort(traj);

    // === Validation privilège + calcul pénalité ===
    const validation = validerPrivilege();
    if (validation.depasse) {
      document.getElementById('ddPrivAlert').classList.add('show');
      document.getElementById('ddPrivAlert').innerHTML = validation.message;
      const penalite = calculerPenalite(ddCurrentCol, validation.exces);
      document.getElementById('dd-stat-penalite').textContent = fmtCAD(penalite);
    } else {
      document.getElementById('ddPrivAlert').classList.remove('show');
      document.getElementById('dd-stat-penalite').textContent = '0,00 $';
    }
  }

  // ============ RENDRE LA LISTE DES VERSEMENTS ============
  function rendreListeVersements() {
    const list = document.getElementById('ddVersList');
    if (ddVersements.length === 0) {
      list.innerHTML = '<div style="color:rgba(255,255,255,0.4);font-size:12px;font-style:italic;padding:8px 0;">Aucun versement supplémentaire. Ajoute-en un ci-dessous.</div>';
      return;
    }

    list.innerHTML = ddVersements.map((v, idx) => {
      const subs = Array.from(ddCurrentCol.querySelectorAll('.subpret'));
      const lettre = String.fromCharCode(65 + (v.subpretIdx || 0));
      const freqLbl = { ponctuel: 'Ponctuel', annuel: 'Annuel', semestriel: 'Semestriel', trimestriel: 'Trimestriel', mensuel: 'Mensuel' }[v.frequence] || v.frequence;
      const isEditing = idx === ddEditingIdx;
      return `
        <div class="dd-vers-item${isEditing ? ' editing' : ''}">
          <div><span class="col-lbl">Date :</span> <span class="col-val">${v.date}</span></div>
          <div><span class="col-lbl">Montant :</span> <span class="col-val">${fmtCAD(v.montant)}</span></div>
          <div><span class="col-lbl">Fréquence :</span> <span class="col-val">${freqLbl}</span></div>
          <div><span class="col-lbl">Sous-prêt :</span> <span class="col-val">${lettre}</span></div>
          <div class="vers-actions">
            <button class="vers-edit" data-idx="${idx}" title="Modifier">✎</button>
            <button class="vers-remove" data-idx="${idx}" title="Retirer">×</button>
          </div>
        </div>
      `;
    }).join('');

    // Bouton modifier : charger le versement dans le formulaire
    list.querySelectorAll('.vers-edit').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        const v = ddVersements[idx];
        if (!v) return;
        // Charger les valeurs dans le formulaire
        document.getElementById('ddVersDate').value = v.date;
        document.getElementById('ddVersMontant').value = v.montant;
        document.getElementById('ddVersFreq').value = v.frequence;
        // Le sous-prêt cible : retrouver l'index dans le select (qui filtre les HELOC)
        const sel = document.getElementById('ddVersSubpret');
        for (let i = 0; i < sel.options.length; i++) {
          if (parseInt(sel.options[i].value) === v.subpretIdx) {
            sel.selectedIndex = i;
            break;
          }
        }
        // Activer le mode édition
        ddEditingIdx = idx;
        const addBtn = document.getElementById('ddVersAdd');
        const cancelBtn = document.getElementById('ddVersCancel');
        addBtn.textContent = '✓ Sauvegarder';
        addBtn.classList.add('editing-mode');
        cancelBtn.style.display = 'inline-block';
        // Re-render pour afficher l'item en mode édition (bordure dorée)
        rendreListeVersements();
        // Scroll vers le formulaire
        document.querySelector('.dd-vers-form').scrollIntoView({ behavior: 'smooth', block: 'center' });
        document.getElementById('ddVersMontant').focus();
        document.getElementById('ddVersMontant').select();
      });
    });

    list.querySelectorAll('.vers-remove').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        ddVersements.splice(idx, 1);
        // Si on supprime le versement en cours d'édition, sortir du mode édition
        if (idx === ddEditingIdx) {
          annulerEditionVersement();
        } else if (idx < ddEditingIdx) {
          // Si on supprime un versement avant celui en édition, ajuster l'index
          ddEditingIdx--;
        }
        rendreDeepDive();
      });
    });
  }

  // Sortir du mode édition (sans sauvegarder)
  function annulerEditionVersement() {
    ddEditingIdx = -1;
    const addBtn = document.getElementById('ddVersAdd');
    const cancelBtn = document.getElementById('ddVersCancel');
    if (addBtn) {
      addBtn.textContent = '+ Ajouter';
      addBtn.classList.remove('editing-mode');
    }
    if (cancelBtn) cancelBtn.style.display = 'none';
  }

  // ============ SÉLECTEUR DE SOUS-PRÊTS ============
  function rendreSelecteurSubprets() {
    const sel = document.getElementById('ddVersSubpret');
    if (!ddCurrentCol) return;
    const subs = Array.from(ddCurrentCol.querySelectorAll('.subpret'))
      .filter(s => s.querySelector('[data-f=type]').value !== 'heloc');

    if (subs.length === 0) {
      sel.innerHTML = '<option value="">Aucun prêt amortissable</option>';
      return;
    }

    sel.innerHTML = subs.map((s, i) => {
      const lettre = String.fromCharCode(65 + i);
      return `<option value="${i}">Sous-prêt ${lettre}</option>`;
    }).join('');
  }

  // ============ TABLEAU D'AMORTISSEMENT (vue annuelle) ============
  function rendreTableauAmort(traj) {
    const container = document.getElementById('dd-table');
    const aDesAmortissables = traj && traj.trajParSub && traj.trajParSub.length > 0;
    const aDesHelocs = traj && traj.helocs && traj.helocs.length > 0;

    if (!aDesAmortissables && !aDesHelocs) {
      container.innerHTML = '<div style="padding:24px;text-align:center;color:rgba(255,255,255,0.5);font-size:13px;">Aucun prêt dans ce scénario.</div>';
      return;
    }

    const maxAnnees = aDesAmortissables ? Math.ceil(traj.maxMois / 12) : 25;
    const today = new Date();

    const lignesParAnnee = [];
    for (let annee = 1; annee <= maxAnnees; annee++) {
      const parSub = [];
      let totPmt = 0, totInt = 0, totCap = 0, totVers = 0, totSolde = 0;
      let auMoinsUnPret = false;

      // Sous-prêts amortissables
      if (aDesAmortissables) {
        traj.trajParSub.forEach(t => {
          let pmt = 0, interet = 0, capRemb = 0, versement = 0, soldeFin = 0;
          for (let m = (annee - 1) * 12 + 1; m <= annee * 12; m++) {
            const ligne = t.avec[m - 1];
            if (ligne) {
              pmt += ligne.paiement;
              interet += ligne.interet;
              capRemb += ligne.capital_remb;
              versement += ligne.versement;
              auMoinsUnPret = true;
            }
          }
          const idxFin = Math.min(annee * 12, t.avec.length) - 1;
          if (idxFin >= 0 && t.avec[idxFin]) soldeFin = t.avec[idxFin].capital_fin;
          if (pmt > 0 || soldeFin > 0) {
            parSub.push({
              type: 'amort',
              lettre: t.lettre,
              color: SUBPRET_COLORS[t.globalIdx % SUBPRET_COLORS.length],
              pmt, interet, capRemb, versement, soldeFin
            });
            totPmt += pmt; totInt += interet; totCap += capRemb; totVers += versement; totSolde += soldeFin;
          }
        });
      }

      // HELOC : intérêt seulement, solde constant = portion utilisée
      if (aDesHelocs) {
        traj.helocs.forEach(h => {
          if (h.utilisee > 0 || h.autorisee > 0) {
            parSub.push({
              type: 'heloc',
              lettre: h.lettre,
              color: SUBPRET_COLORS[h.globalIdx % SUBPRET_COLORS.length],
              pmt: h.interetAnnuel,
              interet: h.interetAnnuel,
              capRemb: 0,
              versement: 0,
              soldeFin: h.utilisee,
              autorisee: h.autorisee,
              taux: h.tauxAnnuel
            });
            totPmt += h.interetAnnuel;
            totInt += h.interetAnnuel;
            totSolde += h.utilisee;
            auMoinsUnPret = true;
          }
        });
      }

      if (!auMoinsUnPret) break;
      lignesParAnnee.push({ annee, parSub, totPmt, totInt, totCap, totVers, totSolde });
      // Stop si plus aucun amortissable et pas de HELOC
      if (aDesAmortissables && totSolde - (aDesHelocs ? traj.helocs.reduce((a, h) => a + h.utilisee, 0) : 0) <= 0.01) break;
      if (!aDesAmortissables && annee >= 25) break;
    }

    const html = `
      <table class="dd-table">
        <thead>
          <tr>
            <th>An</th><th>Année</th><th>Sous-prêt</th><th>Paiements</th><th>Intérêts</th><th>Capital</th><th>Versements</th><th>Solde fin</th><th></th>
          </tr>
        </thead>
        <tbody>
          ${lignesParAnnee.map(la => {
            const an = today.getFullYear() + la.annee - 1;
            let rows = la.parSub.map((s, j) => {
              if (s.type === 'heloc') {
                return `
                  <tr style="border-left: 3px dashed ${s.color}; opacity: 0.92;">
                    <td>${j === 0 ? la.annee : ''}</td>
                    <td>${j === 0 ? an : ''}</td>
                    <td style="color: ${s.color}; font-weight: 600;">${s.lettre} <span style="opacity:0.6;font-weight:400;font-size:10px;">HELOC</span></td>
                    <td>${fmtCAD(s.pmt)}</td>
                    <td>${fmtCAD(s.interet)}</td>
                    <td style="opacity:0.4;">—</td>
                    <td style="opacity:0.4;">—</td>
                    <td>${fmtCAD(s.soldeFin)}<br><span style="font-size:9px;opacity:0.5;">/ ${fmtCAD(s.autorisee)}</span></td>
                    <td></td>
                  </tr>
                `;
              }
              return `
                <tr style="border-left: 3px solid ${s.color};">
                  <td>${j === 0 ? la.annee : ''}</td>
                  <td>${j === 0 ? an : ''}</td>
                  <td style="color: ${s.color}; font-weight: 600;">${s.lettre}</td>
                  <td>${fmtCAD(s.pmt)}</td>
                  <td>${fmtCAD(s.interet)}</td>
                  <td>${fmtCAD(s.capRemb)}</td>
                  <td class="vers-cell">${s.versement > 0 ? fmtCAD(s.versement) : '—'}</td>
                  <td>${fmtCAD(s.soldeFin)}</td>
                  <td>${j === 0 ? '<button class="add-vers-inline" data-annee="' + la.annee + '">+ Versement</button>' : ''}</td>
                </tr>
              `;
            }).join('');
            if (la.parSub.length > 1) {
              rows += `
                <tr class="year-end" style="background: rgba(255,255,255,0.04);">
                  <td></td><td></td>
                  <td style="color:var(--white);font-weight:700;">TOTAL</td>
                  <td style="color:var(--white);font-weight:700;">${fmtCAD(la.totPmt)}</td>
                  <td style="color:var(--white);font-weight:700;">${fmtCAD(la.totInt)}</td>
                  <td style="color:var(--white);font-weight:700;">${fmtCAD(la.totCap)}</td>
                  <td class="vers-cell" style="font-weight:700;">${la.totVers > 0 ? fmtCAD(la.totVers) : '—'}</td>
                  <td style="color:var(--white);font-weight:700;">${fmtCAD(la.totSolde)}</td>
                  <td></td>
                </tr>
              `;
            }
            return rows;
          }).join('')}
        </tbody>
      </table>
    `;
    container.innerHTML = html;
    container.querySelectorAll('.add-vers-inline').forEach(btn => {
      btn.addEventListener('click', () => {
        const annee = parseInt(btn.dataset.annee);
        const date = new Date(today.getFullYear() + annee - 1, today.getMonth(), today.getDate());
        document.getElementById('ddVersDate').value = date.toISOString().slice(0, 10);
        document.getElementById('ddVersFreq').value = 'ponctuel';
        document.getElementById('ddVersMontant').focus();
        document.getElementById('ddVersMontant').select();
        document.querySelector('.dd-vers-form').scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    });
  }

  // ============ VALIDATION DU PRIVILÈGE ============
  // Privilège : 10/10, 15/15, 20/20 (% capital original par année calendrier)
  function validerPrivilege() {
    if (!ddCurrentCol || ddVersements.length === 0) return { depasse: false };

    const privPct = { '10-10': 0.10, '15-15': 0.15, '20-20': 0.20 }[ddCurrentPrivilege] || 0.10;

    // Capital original par sous-prêt
    const subs = Array.from(ddCurrentCol.querySelectorAll('.subpret'))
      .filter(s => s.querySelector('[data-f=type]').value !== 'heloc');
    const capitalOrigParSub = subs.map(s => parseFloat(s.querySelector('[data-f=portion]').value) || 0);

    // Distribuer les versements et regrouper par année + sous-prêt
    const dist = distribuerVersements(ddVersements);
    const today = new Date();

    // versParAnneeSub[annee][subIdx] = total$ versé cette année sur ce sous-prêt
    const versParAnneeSub = {};
    dist.forEach(v => {
      const an = Math.floor((v.mois - 1) / 12) + 1;
      if (!versParAnneeSub[an]) versParAnneeSub[an] = {};
      const idx = v.subpretIdx || 0;
      versParAnneeSub[an][idx] = (versParAnneeSub[an][idx] || 0) + v.montant;
    });

    // Vérifier dépassement
    const depassements = [];
    let totalExces = 0;
    Object.keys(versParAnneeSub).forEach(an => {
      Object.keys(versParAnneeSub[an]).forEach(idx => {
        const verseAnnee = versParAnneeSub[an][idx];
        const capOrig = capitalOrigParSub[idx] || 0;
        const limite = capOrig * privPct;
        if (verseAnnee > limite) {
          depassements.push({
            annee: parseInt(an),
            subpret: String.fromCharCode(65 + parseInt(idx)),
            verse: verseAnnee,
            limite,
            exces: verseAnnee - limite
          });
          totalExces += verseAnnee - limite;
        }
      });
    });

    if (depassements.length === 0) {
      // Calculer le restant disponible pour l'année 1
      const annee1Verse = (versParAnneeSub[1] && Object.values(versParAnneeSub[1]).reduce((a,b) => a+b, 0)) || 0;
      const limiteTotale = capitalOrigParSub.reduce((a,b) => a+b, 0) * privPct;
      const restant = limiteTotale - annee1Verse;
      return {
        depasse: false,
        message: '<strong>Privilège ' + ddCurrentPrivilege + ' respecté.</strong> Maximum restant cette année : <span class="max-restant">' + fmtCAD(Math.max(0, restant)) + '</span>'
      };
    }

    let msg = '<strong>⚠ Privilège ' + ddCurrentPrivilege + ' dépassé.</strong> ';
    msg += depassements.map(d =>
      'Sous-prêt ' + d.subpret + ' année ' + d.annee + ' : ' + fmtCAD(d.verse) +
      ' versé sur une limite de ' + fmtCAD(d.limite) + ' (excédent ' + fmtCAD(d.exces) + ')'
    ).join('. ');
    msg += '<br>Pénalité estimée appliquée sur l\'excédent.';

    return { depasse: true, message: msg, exces: totalExces };
  }

  // ============ MODALE CONSULTATION GRATUITE ============
  const consultOverlay = $('consultOverlay');
  const consultCloseBtn = $('consultCloseBtn');
  const ctaBookingBtn = $('ctaBookingBtn');
  const consultSubmitBtn = $('consultSubmitBtn');
  const consultFormWrap = $('consultFormWrap');
  const consultSuccess = $('consultSuccess');
  const consultError = $('consultError');
  const consultContext = $('consultContext');
  const consultNom = $('consultNom');
  const consultCourriel = $('consultCourriel');
  const consultCell = $('consultCell');

  function ouvrirConsultation() {
    // Reset état
    consultFormWrap.style.display = '';
    consultSuccess.style.display = 'none';
    consultError.classList.remove('show');
    consultError.textContent = '';
    consultSubmitBtn.disabled = false;
    consultSubmitBtn.textContent = 'Demander une consultation gratuite';

    // Pré-remplir si on a déjà obtenu le consentement (donc nom/courriel/cell connus)
    try {
      const consentData = localStorage.getItem('hippo_consent_data');
      if (consentData) {
        const parsed = JSON.parse(consentData);
        if (parsed.nom) consultNom.value = parsed.nom;
        if (parsed.courriel) consultCourriel.value = parsed.courriel;
        if (parsed.cellulaire) consultCell.value = parsed.cellulaire;
      }
    } catch(e) {}

    // Construire le résumé contextuel des scénarios
    const cols = document.querySelectorAll('#colsWrap .col');
    if (cols.length === 0) {
      consultContext.innerHTML = '<em>Aucun scénario configuré pour le moment.</em>';
    } else {
      const vm = parseFloat(document.getElementById('g_vm')?.value) || 0;
      const mdf = parseFloat(document.getElementById('g_mdf')?.value) || 0;
      const pretAvantPrime = vm - mdf;
      const ratioMDF = vm > 0 ? (mdf / vm) * 100 : 0;
      const typeTrans = document.getElementById('g_type')?.value || 'achat';
      // Calcul prime SCHL (achat seulement, MDF < 20%)
      let primeSCHL = 0;
      if (typeTrans === 'achat' && ratioMDF < 20) {
        if (ratioMDF < 10) primeSCHL = pretAvantPrime * 0.04;
        else if (ratioMDF < 15) primeSCHL = pretAvantPrime * 0.031;
        else primeSCHL = pretAvantPrime * 0.028;
      }
      const pretTotal = pretAvantPrime + primeSCHL;
      const nbScenarios = cols.length;
      consultContext.innerHTML = '<strong>Tes calculs en un coup d\'œil :</strong><br>'
        + 'Valeur marchande : <strong>' + fmtCAD(vm) + '</strong> · '
        + 'Mise de fonds : <strong>' + fmtCAD(mdf) + '</strong> (' + ratioMDF.toFixed(1) + ' %)<br>'
        + 'Prêt total : <strong>' + fmtCAD(pretTotal) + '</strong>'
        + (primeSCHL > 0 ? ' (incluant ' + fmtCAD(primeSCHL) + ' de prime SCHL)' : '')
        + '<br>' + nbScenarios + ' scénario' + (nbScenarios > 1 ? 's' : '') + ' à analyser ensemble lors de la consultation.';
    }

    consultOverlay.classList.add('show');
    document.body.style.overflow = 'hidden';
    setTimeout(() => consultNom.focus(), 100);
  }

  function fermerConsultation() {
    consultOverlay.classList.remove('show');
    document.body.style.overflow = '';
  }

  ctaBookingBtn.addEventListener('click', ouvrirConsultation);
  consultCloseBtn.addEventListener('click', fermerConsultation);
  consultOverlay.addEventListener('click', e => {
    if (e.target === consultOverlay) fermerConsultation();
  });

  // Validation simple
  function validateConsultForm() {
    const nom = consultNom.value.trim();
    const courriel = consultCourriel.value.trim();
    const cell = consultCell.value.trim();
    if (!nom) return 'Indique ton nom complet.';
    if (!courriel || !courriel.includes('@') || !courriel.includes('.')) return 'Courriel invalide.';
    if (!cell || cell.replace(/[^0-9]/g, '').length < 10) return 'Numéro de téléphone invalide (10 chiffres requis).';
    return null;
  }

  // Construire le payload complet avec tous les scénarios
  function construirePayloadConsultation() {
    const cols = Array.from(document.querySelectorAll('#colsWrap .col'));
    const vm = parseFloat(document.getElementById('g_vm')?.value) || 0;
    const mdf = parseFloat(document.getElementById('g_mdf')?.value) || 0;
    const typeTransaction = document.getElementById('g_type')?.value || 'achat';
    const pretAvantPrime = vm - mdf;
    const ratioMDF = vm > 0 ? (mdf / vm) * 100 : 0;
    let primeSCHL = 0;
    if (typeTransaction === 'achat' && ratioMDF < 20) {
      if (ratioMDF < 10) primeSCHL = pretAvantPrime * 0.04;
      else if (ratioMDF < 15) primeSCHL = pretAvantPrime * 0.031;
      else primeSCHL = pretAvantPrime * 0.028;
    }
    const pretTotal = pretAvantPrime + primeSCHL;

    const scenarios = cols.map((col, idx) => {
      const subprets = Array.from(col.querySelectorAll('.subpret')).map((sub, sIdx) => {
        const r = calculerSubpret(sub);
        const lettre = String.fromCharCode(65 + sIdx);
        const subType = sub.querySelector('[data-f=type]').value;
        const portion = parseFloat(sub.querySelector('[data-f=portion]')?.value) || 0;
        const utilisee = parseFloat(sub.querySelector('[data-f=utilisee]')?.value) || 0;
        const taux = parseFloat(sub.querySelector('[data-f=taux]')?.value) || 0;
        const terme = parseFloat(sub.querySelector('[data-f=terme]')?.value) || 0;
        const amort = parseFloat(sub.querySelector('[data-f=amort]')?.value) || 0;
        const freq = sub.querySelector('[data-f=freq]')?.value || 'mensuel';
        const prime = parseFloat(sub.querySelector('[data-f=prime]')?.value) || 0;
        const premium = parseFloat(sub.querySelector('[data-f=premium]')?.value) || 0;
        return {
          ordre: sIdx + 1,
          lettre: lettre,
          type: subType,
          portion_attribuee: portion,
          portion_utilisee: subType === 'heloc' ? utilisee : portion,
          taux: subType === 'heloc' ? (prime + premium) : taux,
          taux_preferentiel: subType === 'heloc' ? prime : null,
          prime_preteur: subType === 'heloc' ? premium : null,
          terme_annees: terme || null,
          amortissement_annees: amort || null,
          frequence_paiement: subType === 'heloc' ? 'mensuel' : freq,
          paiement_par_periode: r.paiementFreq || r.mensuel || 0,
          interet_terme: r.intTerme || 0,
          interet_amort: r.intAmort || 0
        };
      });
      return {
        numero: idx + 1,
        nb_sous_prets: subprets.length,
        subprets: subprets
      };
    });

    return {
      source: 'calculatrice_hypolite',
      intention: 'consultation_rdv',
      timestamp: new Date().toISOString(),
      url: location.href,
      lead: {
        nom: consultNom.value.trim(),
        courriel: consultCourriel.value.trim(),
        cellulaire: consultCell.value.trim()
      },
      consentement_loi25: true,
      calcul: {
        global: {
          type_transaction: typeTransaction,
          valeur_marchande: vm,
          mise_de_fonds: mdf,
          ratio_mdf_pct: ratioMDF,
          pret_avant_prime: pretAvantPrime,
          prime_schl: primeSCHL,
          pret_total: pretTotal
        },
        nb_scenarios: scenarios.length,
        scenarios: scenarios
      }
    };
  }

  // Soumission
  consultSubmitBtn.addEventListener('click', async () => {
    const erreur = validateConsultForm();
    if (erreur) {
      consultError.textContent = erreur;
      consultError.classList.add('show');
      return;
    }
    consultError.classList.remove('show');
    consultSubmitBtn.disabled = true;
    consultSubmitBtn.textContent = 'Envoi en cours...';

    const payload = construirePayloadConsultation();

    // Sauvegarder localement les coordonnées comme consentement (pour pré-remplissage futur)
    try {
      localStorage.setItem('hippo_consent_data', JSON.stringify({
        nom: consultNom.value.trim(),
        courriel: consultCourriel.value.trim(),
        cellulaire: consultCell.value.trim(),
        date: new Date().toISOString()
      }));
    } catch(e) {}

    // Envoi au flow Power Automate (URL injectée plus tard)
    try {
      if (CONFIG.POWER_AUTOMATE_URL) {
        const response = await fetch(CONFIG.POWER_AUTOMATE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!response.ok) throw new Error('HTTP ' + response.status);
      } else {
        // Mode dev/test : log dans la console
        console.log('Payload consultation (POWER_AUTOMATE_URL non configurée) :', payload);
        await new Promise(resolve => setTimeout(resolve, 800));
      }
      // Succès
      consultFormWrap.style.display = 'none';
      consultSuccess.style.display = 'block';
    } catch (err) {
      console.error('Erreur envoi consultation :', err);
      consultError.textContent = 'Erreur lors de l\'envoi. Réessaie ou contacte Simon directement à slabrecque@planipret.com';
      consultError.classList.add('show');
      consultSubmitBtn.disabled = false;
      consultSubmitBtn.textContent = 'Demander une consultation gratuite';
    }
  });

  // Soumission au clavier
  [consultNom, consultCourriel, consultCell].forEach(el => {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        consultSubmitBtn.click();
      }
    });
  });
</script>

<script>
  // ============ MODE EMBED ============
  if (new URLSearchParams(location.search).get('embed') === '1') {
    document.body.classList.add('embed');
  }

  // ============ MODALE CONSENTEMENT ============
  const modal = $('consentModal');
  const formView = $('formView');
  const privacyView = $('privacyView');
  const showPrivacy = $('showPrivacy');
  const backToForm = $('backToForm');
  const closeBtn = $('closeModal');
  const submitBtn = $('submitLead');
  const consentPrincipal = $('consent_principal');
  const consentMarketing = $('consent_marketing');
  const leadNom = $('lead_nom');
  const leadEmail = $('lead_email');
  const leadTel = $('lead_tel');
  const modalStatus = $('modalStatus');
  const shareActions = $('shareActions');

  let modalShown = false;

  function hasValidConsent() {
    try {
      const raw = localStorage.getItem(CONFIG.STORAGE_KEY);
      if (!raw) return false;
      const data = JSON.parse(raw);
      const ageDays = (Date.now() - new Date(data.timestamp).getTime()) / (1000*60*60*24);
      return ageDays < CONFIG.CONSENT_VALIDITY_DAYS && data.version === CONFIG.PRIVACY_VERSION;
    } catch { return false; }
  }

  function validateForm() {
    const nomOk = leadNom.value.trim().length >= 2;
    const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(leadEmail.value.trim());
    const telOk = leadTel.value.replace(/\D/g, '').length >= 10;
    const consentOk = consentPrincipal.checked;
    submitBtn.disabled = !(nomOk && emailOk && telOk && consentOk);
  }

  [leadNom, leadEmail, leadTel].forEach(el => el.addEventListener('input', validateForm));
  consentPrincipal.addEventListener('change', validateForm);

  function ouvrirModale() {
    if (modalShown || hasValidConsent()) return;
    if (document.body.classList.contains('embed')) return;
    modalShown = true;
    formView.classList.remove('hide');
    privacyView.classList.remove('show');
    modal.classList.add('show');
    setTimeout(() => leadNom.focus(), 100);
  }

  function fermerModale() {
    modal.classList.remove('show');
    setTimeout(() => { modalShown = false; }, 300);
  }

  closeBtn.addEventListener('click', fermerModale);
  modal.addEventListener('click', e => { if (e.target === modal) fermerModale(); });
  showPrivacy.addEventListener('click', () => {
    formView.classList.add('hide');
    privacyView.classList.add('show');
  });
  backToForm.addEventListener('click', () => {
    formView.classList.remove('hide');
    privacyView.classList.remove('show');
  });

  // Snapshot complet de la calc (avec sous-prêts)
  function snapshotCalc() {
    const vm_val = parseFloat(gVm.value) || 0;
    const globalData = {
      type_transaction: gType.value,
      valeur_marchande: vm_val,
      mise_de_fonds: parseFloat(gMdf.value) || 0,
      mise_de_fonds_pct: parseFloat(gMdfPct.value) || 0,
      pret_total: pretTotal,
      capacite_max_80pct: vm_val * 0.80,
      capacite_max_heloc_65pct: vm_val * 0.65
    };
    const scenarios = [];
    wrap.querySelectorAll('.col').forEach((col, idx) => {
      const subprets = [];
      col.querySelectorAll('.subpret').forEach((sub, sidx) => {
        const r = calculerSubpret(sub);
        const data = {
          ordre: sidx + 1,
          lettre: String.fromCharCode(65 + sidx),
          type: r.type,
          paiement_mensuel: r.mensuel
        };
        if (r.type === 'heloc') {
          data.marge_autorisee = r.margeAutorisee;
          data.portion_utilisee = r.portionUtilisee;
          data.capacite_disponible = r.capaciteDispo;
          data.taux_preferentiel = parseFloat(sub.querySelector('[data-f=prime]')?.value) || 0;
          data.prime_preteur = parseFloat(sub.querySelector('[data-f=premium]')?.value) || 0;
          data.taux_effectif = r.tauxEff;
          data.interet_mensuel_actuel = r.mensuel;
          data.interet_si_pleine_utilisation = r.mensuelMax;
        } else {
          data.portion = r.portion;
          data.taux = parseFloat(sub.querySelector('[data-f=taux]')?.value) || 0;
          data.terme_annees = parseFloat(sub.querySelector('[data-f=terme]')?.value) || 0;
          data.amortissement_annees = parseFloat(sub.querySelector('[data-f=amort]')?.value) || 0;
          data.interet_sur_terme = r.intTerme;
          data.interet_sur_amortissement = r.intAmort;
          data.solde_fin_terme = r.soldeFinTerme;
        }
        subprets.push(data);
      });
      scenarios.push({
        numero: idx + 1,
        subprets,
        total_attribue: parseFloat(col.dataset.totalAttribue) || 0,
        total_mensuel: parseFloat(col.dataset.totalMensuel) || 0
      });
    });
    return { global: globalData, scenarios };
  }

  // Submit lead vers Power Automate
  async function envoyerLead(intention = 'inscription') {
    const payload = {
      source: 'calculatrice_hypolite',
      intention, // inscription | recevoir_courriel | telecharger_pdf | imprimer
      timestamp: new Date().toISOString(),
      privacy_version: CONFIG.PRIVACY_VERSION,
      lead: {
        nom: leadNom.value.trim(),
        courriel: leadEmail.value.trim(),
        cellulaire: leadTel.value.trim()
      },
      consentements: {
        principal: consentPrincipal.checked,
        marketing: consentMarketing.checked,
        timestamp: new Date().toISOString(),
        user_agent: navigator.userAgent,
        url: location.href
      },
      calcul: snapshotCalc()
    };

    if (CONFIG.POWER_AUTOMATE_URL) {
      const resp = await fetch(CONFIG.POWER_AUTOMATE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
    } else {
      console.log('[Hypolite Lead]', payload);
    }
    return payload;
  }

  submitBtn.addEventListener('click', async () => {
    if (submitBtn.disabled) return;
    submitBtn.disabled = true;
    submitBtn.textContent = 'Envoi en cours...';
    modalStatus.textContent = '';
    modalStatus.className = 'modal-status';

    try {
      await envoyerLead('inscription');
      localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify({
        version: CONFIG.PRIVACY_VERSION,
        timestamp: new Date().toISOString(),
        marketing: consentMarketing.checked,
        lead: {
          nom: leadNom.value.trim(),
          courriel: leadEmail.value.trim(),
          cellulaire: leadTel.value.trim()
        }
      }));
      modalStatus.textContent = 'Merci ! Tu peux maintenant partager tes calculs.';
      modalStatus.classList.add('success');
      submitBtn.textContent = 'Envoyé ✓';
      setTimeout(() => {
        fermerModale();
        // Exécuter l'action en attente après le consentement (si présente)
        if (pendingShareAction) {
          const action = pendingShareAction;
          pendingShareAction = null;
          setTimeout(action, 300);
        }
      }, 1500);
    } catch (err) {
      console.error('Erreur envoi:', err);
      modalStatus.textContent = "Erreur d'envoi. Réessaie ou écris à slabrecque@planipret.com.";
      modalStatus.classList.add('error');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Continuer';
    }
  });

  // Boutons partage sont déjà dans le header, toujours visibles

  // ============ TRIGGERS DE CAPTURE D'INTENTION ============
  document.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    const meta = e.metaKey || e.ctrlKey;
    if (e.key === 'PrintScreen') ouvrirModale();
    if (meta && k === 'p') ouvrirModale();
    if (meta && k === 's') ouvrirModale();
    if (e.shiftKey && (e.metaKey || e.getModifierState('OS') || e.getModifierState('Meta'))
        && (k === 's' || k === '3' || k === '4' || k === '5')) ouvrirModale();
  });
  window.addEventListener('beforeprint', ouvrirModale);

  let exitIntentArmed = false;
  setTimeout(() => { exitIntentArmed = true; }, 8000);
  document.addEventListener('mouseleave', e => {
    if (exitIntentArmed && e.clientY <= 0) ouvrirModale();
  });

  let inactivityTimer;
  function resetInactivity() {
    clearTimeout(inactivityTimer);
    inactivityTimer = setTimeout(ouvrirModale, 90000);
  }
  ['mousemove','keydown','scroll','touchstart','click'].forEach(ev =>
    document.addEventListener(ev, resetInactivity, { passive: true }));
  resetInactivity();

  let visibilityArmed = false;
  setTimeout(() => { visibilityArmed = true; }, 15000);
  document.addEventListener('visibilitychange', () => {
    if (visibilityArmed && document.visibilityState === 'visible') {
      setTimeout(() => { if (!hasValidConsent()) ouvrirModale(); }, 1500);
    }
  });

  // ============ ACTIONS DE PARTAGE ============
  const shareEmailBtn = $('shareEmailBtn');
  const sharePdfBtn = $('sharePdfBtn');
  const sharePrintBtn = $('sharePrintBtn');

  // Action en attente : si l'utilisateur clique sur un bouton partage sans consentement,
  // on stocke l'action et on l'exécute après la soumission de la modale
  let pendingShareAction = null;

  // Wrapper qui exige le consentement avant d'exécuter une action
  function requiresConsent(action, intention) {
    return () => {
      if (hasValidConsent()) {
        action();
      } else {
        pendingShareAction = action;
        ouvrirModale();
      }
    };
  }

  // Préparer la date d'impression
  function prepPrint() {
    const d = new Date();
    const dateStr = d.toLocaleDateString('fr-CA', { year: 'numeric', month: 'long', day: 'numeric' });
    const printDate = $('printDate');
    if (printDate) printDate.textContent = dateStr;
  }

  // Imprimer / PDF : ouvrent la popup de sélection des scénarios
  sharePrintBtn.addEventListener('click', requiresConsent(() => {
    ouvrirPopupImpression('print');
  }, 'imprimer'));

  sharePdfBtn.addEventListener('click', requiresConsent(() => {
    ouvrirPopupImpression('pdf');
  }, 'telecharger_pdf'));

  // ============ POPUP D'IMPRESSION ============
  const printModal = document.getElementById('printModal');
  const pmList = document.getElementById('pmScenariosList');
  const pmCancel = document.getElementById('pmCancel');
  const pmConfirm = document.getElementById('pmConfirm');
  const pmModeToggle = printModal.querySelectorAll('.pm-mode-toggle button');

  let pmSelectedColIds = [];
  let pmMode = 'dark';
  let pmAction = 'pdf';

  function ouvrirPopupImpression(action) {
    pmAction = action || 'pdf';
    pmConfirm.textContent = pmAction === 'pdf' ? 'Télécharger PDF' : 'Imprimer';
    pmSelectedColIds = [];
    pmConfirm.disabled = true;

    const cols = document.querySelectorAll('#colsWrap .col');
    if (cols.length === 0) {
      alert('Aucun scénario à imprimer.');
      return;
    }

    const fmt = new Intl.NumberFormat('fr-CA', { style: 'currency', currency: 'CAD', minimumFractionDigits: 0, maximumFractionDigits: 0 });
    pmList.innerHTML = Array.from(cols).map(col => {
      const num = col.querySelector('.col-num').textContent;
      const subs = col.querySelectorAll('.subpret').length;
      const mensuel = parseFloat(col.dataset.totalMensuel) || 0;
      return '<div class="pm-scenario-item" data-id="' + col.dataset.id + '">'
        + '<div class="checkbox"></div>'
        + '<div class="info">'
        + '<div class="name">' + num + '</div>'
        + '<div class="detail">' + subs + ' sous-prêt' + (subs > 1 ? 's' : '') + ' · ' + fmt.format(mensuel) + '/mois</div>'
        + '</div></div>';
    }).join('');

    pmList.querySelectorAll('.pm-scenario-item').forEach(item => {
      item.addEventListener('click', () => {
        const id = item.dataset.id;
        const isSel = pmSelectedColIds.includes(id);
        if (isSel) {
          pmSelectedColIds = pmSelectedColIds.filter(x => x !== id);
          item.classList.remove('selected');
        } else {
          if (pmSelectedColIds.length >= 3) return;
          pmSelectedColIds.push(id);
          item.classList.add('selected');
        }
        pmList.querySelectorAll('.pm-scenario-item').forEach(it => {
          if (pmSelectedColIds.length >= 3 && !pmSelectedColIds.includes(it.dataset.id)) it.classList.add('disabled');
          else it.classList.remove('disabled');
        });
        pmConfirm.disabled = pmSelectedColIds.length === 0;
      });
    });

    if (cols.length === 1) pmList.querySelector('.pm-scenario-item').click();
    printModal.classList.add('show');
  }

  function fermerPopupImpression() { printModal.classList.remove('show'); }
  pmCancel.addEventListener('click', fermerPopupImpression);
  printModal.addEventListener('click', e => { if (e.target === printModal) fermerPopupImpression(); });
  pmModeToggle.forEach(btn => {
    btn.addEventListener('click', () => {
      pmModeToggle.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      pmMode = btn.dataset.mode;
    });
  });
  pmConfirm.addEventListener('click', () => {
    if (pmSelectedColIds.length === 0) return;
    fermerPopupImpression();
    setTimeout(() => lancerImpression(pmSelectedColIds, pmMode, pmAction), 200);
  });

  function lancerImpression(colIds, mode, action) {
    const cols = colIds.map(id => document.querySelector('#colsWrap .col[data-id="' + id + '"]')).filter(Boolean);
    if (cols.length === 0) return;

    let printContainer = document.getElementById('print-render');
    if (!printContainer) {
      printContainer = document.createElement('div');
      printContainer.id = 'print-render';
      document.body.appendChild(printContainer);
    }
    printContainer.className = 'print-render print-mode-' + mode;
    printContainer.innerHTML = genererContenuImpression(cols, mode);

    document.body.classList.add('print-mode-' + mode);
    setTimeout(() => {
      window.print();
      const cleanup = () => {
        document.body.classList.remove('print-mode-dark', 'print-mode-print');
        if (printContainer) printContainer.remove();
        window.removeEventListener('afterprint', cleanup);
      };
      window.addEventListener('afterprint', cleanup);
    }, 400);
  }

  function genererContenuImpression(cols, mode) {
    const vm = parseFloat(document.getElementById('g_vm').value) || 0;
    const mdf = parseFloat(document.getElementById('g_mdf').value) || 0;
    const mdfPct = parseFloat(document.getElementById('g_mdf_pct').value) || 0;
    const typeTrans = document.getElementById('g_type').value;
    const pretTotalEl = document.getElementById('g_pret_total');
    const pretTotalTxt = pretTotalEl ? pretTotalEl.textContent : '—';
    const fmt = new Intl.NumberFormat('fr-CA', { style: 'currency', currency: 'CAD', minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const today = new Date();
    const dateStr = today.toLocaleDateString('fr-CA', { year: 'numeric', month: 'long', day: 'numeric' });

    let html = ''
      + '<section class="print-page print-cover">'
      + '<div class="print-cover-header">'
      + '<div><div class="print-brand-name">Hypolite</div><div class="print-brand-sub">Calculatrice hypothécaire</div></div>'
      + '<div class="print-cover-date">' + dateStr + '</div>'
      + '</div>'
      + '<h1 class="print-cover-title">Comparaison de scénarios</h1>'
      + '<div class="print-cover-meta">'
      + '<div><strong>Type :</strong> ' + (typeTrans === 'achat' ? 'Achat' : 'Refinancement') + '</div>'
      + '<div><strong>Valeur marchande :</strong> ' + fmt.format(vm) + '</div>'
      + '<div><strong>Mise de fonds :</strong> ' + fmt.format(mdf) + ' (' + mdfPct.toFixed(2) + ' %)</div>'
      + '<div><strong>Prêt total requis :</strong> ' + pretTotalTxt + '</div>'
      + '</div>'
      + '<div class="print-scenarios-grid grid-' + cols.length + '">'
      + cols.map(col => genererCarteScenarioImpr(col)).join('')
      + '</div>'
      + '<div class="print-page-footer">'
      + '<strong>Simon Labrecque</strong> · Courtier hypothécaire · Planiprêt — Cabinet en courtage hypothécaire<br>'
      + '3455, boul. de la Pinière #205, Terrebonne (QC) J6X 0A1 · slabrecque@planipret.com<br>'
      + '<em>Outil informatif seulement. Les résultats ne constituent pas une offre ni un engagement de prêt.</em>'
      + '</div>'
      + '</section>';

    cols.forEach(col => { html += genererPageAnalyseImpr(col); });
    return html;
  }

  function genererCarteScenarioImpr(col) {
    const num = col.querySelector('.col-num').textContent;
    const fmt = new Intl.NumberFormat('fr-CA', { style: 'currency', currency: 'CAD', minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const totMensuel = parseFloat(col.dataset.totalMensuel) || 0;
    const colors = ['#50AACE', '#D5A05F', '#6fde9c', '#C792EA', '#FF9F45'];

    const subprets = Array.from(col.querySelectorAll('.subpret')).map((sub, i) => {
      const lettre = String.fromCharCode(65 + i);
      const type = sub.querySelector('[data-f=type]').value;
      const portion = parseFloat(sub.querySelector('[data-f=portion]').value) || 0;
      const color = colors[i % colors.length];

      let typeDetail = '';
      if (type === 'heloc') {
        const prime = parseFloat(sub.querySelector('[data-f=prime]')?.value) || 0;
        const premium = parseFloat(sub.querySelector('[data-f=premium]')?.value) || 0;
        const utilisee = parseFloat(sub.querySelector('[data-f=utilisee]')?.value) || 0;
        typeDetail = 'HELOC · Taux ' + (prime + premium).toFixed(2) + '% · Utilisé ' + fmt.format(utilisee);
      } else {
        const taux = parseFloat(sub.querySelector('[data-f=taux]')?.value) || 0;
        const terme = parseFloat(sub.querySelector('[data-f=terme]')?.value) || 0;
        const amort = parseFloat(sub.querySelector('[data-f=amort]')?.value) || 0;
        const freqEl = sub.querySelector('[data-f=freq]');
        const freqVal = freqEl ? freqEl.value : 'mensuel';
        const freqLbl = { mensuel:'Mensuel', bihebdo_acc:'Bi-hebdo accéléré', hebdo_acc:'Hebdo accéléré', bihebdo:'Bi-hebdo', hebdo:'Hebdo', semimensuel:'Semi-mensuel' }[freqVal] || 'Mensuel';
        typeDetail = (type === 'variable' ? 'Variable' : 'Terme fixe') + ' · Taux ' + taux.toFixed(2) + '% · ' + terme + ' ans / amort ' + amort + ' ans · ' + freqLbl;
      }

      return '<div class="print-subpret" style="border-left-color: ' + color + ';">'
        + '<div class="ps-head"><span class="ps-letter" style="color: ' + color + ';">' + lettre + '</span> <span class="ps-portion">' + fmt.format(portion) + '</span></div>'
        + '<div class="ps-detail">' + typeDetail + '</div>'
        + '</div>';
    }).join('');

    return '<div class="print-scenario-card">'
      + '<div class="psc-num">' + num + '</div>'
      + '<div class="psc-mensuel">' + fmt.format(totMensuel) + '<span class="psc-mens-sub">/ mois</span></div>'
      + '<div class="psc-subprets">' + subprets + '</div>'
      + '</div>';
  }

  function genererPageAnalyseImpr(col) {
    const num = col.querySelector('.col-num').textContent;
    let analysisHTML = '<p style="text-align:center;color:rgba(255,255,255,0.5);font-size:11px;padding:40px;">Pour inclure le graphique et le tableau, ouvrez l\'analyse détaillée de ce scénario avant l\'impression.</p>';

    if (window.ddCurrentCol === col) {
      const chart = document.getElementById('dd-chart');
      const table = document.getElementById('dd-table');
      analysisHTML = '';
      if (chart) analysisHTML += '<div class="print-chart">' + chart.innerHTML + '</div>';
      if (table) analysisHTML += '<div class="print-table-wrap">' + table.innerHTML + '</div>';
    }

    return '<section class="print-page print-analysis">'
      + '<div class="print-analysis-header">'
      + '<div><div class="print-brand-name">Hypolite</div><div class="print-brand-sub">' + num + ' — Analyse détaillée</div></div>'
      + '</div>'
      + '<div class="print-analysis-content">' + analysisHTML + '</div>'
      + '<div class="print-page-footer"><strong>Simon Labrecque</strong> · Courtier hypothécaire · Planiprêt<br><em>Outil informatif seulement. Confirmer auprès du prêteur.</em></div>'
      + '</section>';
  }


  // Recevoir par courriel (re-trigger le flow Power Automate avec intention=recevoir_courriel)
  // Action d'envoi courriel (déclenchée après consentement valide)
  async function executerEnvoiCourriel() {
    let leadData;
    try {
      const raw = localStorage.getItem(CONFIG.STORAGE_KEY);
      leadData = raw ? JSON.parse(raw) : null;
    } catch {}
    if (!leadData || !leadData.lead) {
      // Cas extrême : consentement valide mais pas de lead stocké, on ouvre la modale
      pendingShareAction = executerEnvoiCourriel;
      ouvrirModale();
      return;
    }

    const original = shareEmailBtn.innerHTML;
    shareEmailBtn.innerHTML = '<span class="icon">⏳</span> Envoi...';
    shareEmailBtn.disabled = true;

    try {
      const payload = {
        source: 'calculatrice_hypolite',
        intention: 'recevoir_courriel',
        timestamp: new Date().toISOString(),
        privacy_version: CONFIG.PRIVACY_VERSION,
        lead: leadData.lead,
        consentements: {
          principal: true,
          marketing: leadData.marketing || false,
          timestamp: leadData.timestamp,
          user_agent: navigator.userAgent,
          url: location.href
        },
        calcul: snapshotCalc()
      };
      if (CONFIG.POWER_AUTOMATE_URL) {
        const resp = await fetch(CONFIG.POWER_AUTOMATE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
      } else {
        console.log('[Hypolite Email]', payload);
      }
      shareEmailBtn.innerHTML = '<span class="icon">✓</span> Courriel envoyé';
      setTimeout(() => {
        shareEmailBtn.innerHTML = original;
        shareEmailBtn.disabled = false;
      }, 2500);
    } catch (err) {
      console.error('Erreur envoi:', err);
      shareEmailBtn.innerHTML = '<span class="icon">⚠</span> Erreur, réessaie';
      setTimeout(() => {
        shareEmailBtn.innerHTML = original;
        shareEmailBtn.disabled = false;
      }, 2500);
    }
  }
  shareEmailBtn.addEventListener('click', requiresConsent(executerEnvoiCourriel, 'recevoir_courriel'));

  // ============ INIT ============
  recalculerGlobal();
  ajouterColonne();
</script>
